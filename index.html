async function loadAppointments(){
  const dateEl = document.getElementById('cal-date');
  if(!dateEl) return;
  const date = dateEl.value;
  const list = document.getElementById('appt-list');
  list.innerHTML = `<div class="empty-note">${t('loading')}</div>`;
  try{
    const snap = await db.collection('appointments').where('date','==',date).orderBy('time','asc').get();
    if(snap.empty){ list.innerHTML = '<div class="empty-note">예약이 없습니다.</div>'; return; }
    list.innerHTML = snap.docs.map(d=>{
      const a = d.data();
      return `<div class="appt-item"><span class="appt-time">${a.time}</span>${a.name} · ${a.siteName}${a.note?' · '+a.note:''}</div>`;
    }).join('');
  }catch(err){
    list.innerHTML = `<div class="empty-note">불러오기 실패, 아래 링크를 눌러 색인을 만들어주세요:<br>${linkify(err.message)}</div>`;
  }
}

async function submitAppointment(){
  const name = document.getElementById('a-name').value.trim();
  if(!name){ alert('환자 이름을 입력해주세요.'); return; }
  const siteId = document.getElementById('a-site').value;
  const site = sites.find(s=>s.id===siteId);
  const date = document.getElementById('a-date').value;
  const time = document.getElementById('a-time').value;
  const note = document.getElementById('a-note').value;
  try{
    await db.collection('appointments').add({
      name, siteId, siteName: site?site.name:'', date, time, note,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    alert('예약이 등록되었습니다.');
    document.getElementById('cal-date').value = date;
    loadAppointments();
  }catch(err){
    alert('예약 등록 실패: ' + err.message);
  }
}

function toggleQuickAppt(){
  const el = document.getElementById('quick-appt-form');
  if(!el) return;
  if(el.style.display === 'none'){
    const dateEl = document.getElementById('qa-date');
    if(dateEl && !dateEl.value) dateEl.value = new Date().toISOString().slice(0,10);
    el.style.display = 'block';

    el.style.display = 'none';
  }
}

async function submitQuickAppt(){

/* ---- 검사 완료 환자 리스트 (날짜 지정 조회 + 결과 수정) ---- */
let labDoneDate = null;
function renderLabDoneList(){
  if(unsubscribeQueue){ unsubscribeQueue(); unsubscribeQueue=null; }
  const main = document.getElementById('main');
  if(!labDoneDate) labDoneDate = new Date().toISOString().slice(0,10);
  main.innerHTML = `
    <div class="topbar"><h2>검사 완료 환자 리스트</h2><button class="btn small outline" style="width:auto;" onclick="renderLab()">← 검사 대기 리스트</button></div>
    <div class="card">
      <div class="field" style="max-width:220px; margin-bottom:0;"><label>완료 날짜</label><input type="date" id="lab-done-date" value="${labDoneDate}" onchange="onLabDoneDateChange()"></div>
    </div>
    <div id="lab-done-list" class="queue" style="margin-top:14px;"><div class="empty-note">${t('loading')}</div></div>
  `;
  loadLabDoneList();
}
function onLabDoneDateChange(){
  labDoneDate = document.getElementById('lab-done-date').value;
  loadLabDoneList();
}
async function loadLabDoneList(){
  const list = document.getElementById('lab-done-list');
  if(!list) return;
  list.innerHTML = `<div class="empty-note">${t('loading')}</div>`;
  try{
    const startTs = firebase.firestore.Timestamp.fromDate(new Date(labDoneDate+'T00:00:00'));
    const endTs = firebase.firestore.Timestamp.fromDate(new Date(labDoneDate+'T23:59:59'));
    const snap = await db.collection('labQueue').where('status','==','done')
      .where('completedAt','>=',startTs).where('completedAt','<=',endTs)
      .orderBy('completedAt','desc').get();
    if(snap.empty){ list.innerHTML = '<div class="empty-note">해당 날짜에 완료된 검사가 없습니다.</div>'; return; }
    list.innerHTML = snap.docs.map(d=>{
      const l = d.data();
      const itemNames = (l.items||[]).map(i=>i.name).join(', ');
      return `<div class="queue-card" onclick="openLabOrder('${d.id}')">
        <div class="qc-info">
          <div class="name">${l.patientName}${testBadgeHTML(l.testPatient)} <span class="pharm-status">${l.deptName}</span></div>
          <div class="meta">${l.regNo} · ${l.siteName} · ${itemNames}</div>
        </div>
      </div>`;
    }).join('');
  }catch(err){
    list.innerHTML = `<div class="empty-note">목록을 불러오지 못했습니다. Firestore 색인(index) 생성이 필요할 수 있습니다. 아래 링크를 눌러 색인을 만들어주세요.<br>${linkify(err.message)}</div>`;
  }
}

function openLabOrder(id){
  db.collection('labQueue').doc(id).get().then(doc=>{
    if(!doc.exists) return;
    const l = doc.data();
    const editable = canEditArea('lab');
    const isDone = l.status === 'done';
    openSidePanel(`
      <div class="history-panel-head">
        <span>${l.patientName} (${l.regNo}) · ${l.deptName} 검사</span>
        <span style="cursor:pointer;" onclick="closeSidePanel()">✕ 닫기</span>
      </div>
      <div class="history-panel-body">
        ${!editable ? '<div class="note" style="margin-bottom:10px;">보기 전용입니다 (검사실 역할만 결과 입력·완료 처리가 가능합니다).</div>' : ''}
        ${isDone ? `<div class="note" style="margin-bottom:10px;">✅ 완료 처리자: ${l.completedBy||'-'} · 완료일시: ${fmtDate(l.completedAt)}${editable ? ' (결과는 아래에서 계속 수정할 수 있습니다)' : ''}</div>` : ''}
        <div id="lab-order-items">${labOrderItemsHTML(id, l.items||[], editable)}</div>
        ${(editable && !isDone) ? `<button class="btn small" style="margin-top:14px;" onclick="completeLabOrder('${id}')">✅ 검사 완료</button>` : ''}
      </div>
    `);
  });
}
function labOrderItemsHTML(orderId, items, editable){
  return items.map((it,i)=>`
    <div class="field">
      <label>${it.name}</label>
      <textarea rows="2" placeholder="결과 입력" ${editable?'':'disabled'} onchange="updateLabResult('${orderId}',${i},this.value)">${it.result||''}</textarea>
    </div>
  `).join('');
}
async function updateLabResult(orderId, idx, value){
  try{
    const doc = await db.collection('labQueue').doc(orderId).get();
    if(!doc.exists) return;
    const items = (doc.data().items||[]).slice();
    if(!items[idx]) return;
    items[idx] = {...items[idx], result:value};
    await doc.ref.update({items});
  }catch(err){ alert('결과 저장 실패: ' + err.message); }
}
async function completeLabOrder(orderId){
  const who = prompt('검사 완료 처리자 이름을 입력하세요');
  if(!who) return;
  try{
    const doc = await db.collection('labQueue').doc(orderId).get();
    if(!doc.exists) return;
    const l = doc.data();
    await doc.ref.update({status:'done', completedBy: who, completedAt: firebase.firestore.FieldValue.serverTimestamp()});
    if(l.waitingId && l.deptIndex !== undefined && l.deptIndex !== null){
      const wRef = db.collection('waitingList').doc(l.waitingId);
      const wDoc = await wRef.get();
      if(wDoc.exists){
        const wdata = wDoc.data();
        const depts = (wdata.departments||[]).slice();
        if(depts[l.deptIndex]){
          depts[l.deptIndex] = {...depts[l.deptIndex], status:'examDone'};
          const overall = computeOverallStatus(depts);
          await wRef.update({departments: depts, status: overall});
        }
      }
    }
    closeSidePanel();
    alert('검사 완료 처리되었습니다. 대기 리스트에 "검사완료 대기중"으로 표시됩니다.');
  }catch(err){
    alert('처리 실패: ' + err.message);
  }
}

let pharmTab = 'all';

function setPharmTab(tab){
  pharmTab = tab;
  renderPharmacy();
}

function pharmTabBarHTML(){
  const tabs = [
    {id:'all', label:'오늘 진료 환자'},
    {id:'waiting', label:'조제 대기'},
    {id:'prepared', label:'투약 대기'},
    {id:'dispensed', label:'약국 투약·복약지도 완료'},
    {id:'direct', label:'진료실 투약 완료'}
  ];
  return `<div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px;">

  </div>`;
}

function renderPharmacy(){
  if(unsubscribeQueue){ unsubscribeQueue(); unsubscribeQueue=null; }
  const main = document.getElementById('main');
  main.innerHTML = `<div class="topbar"><h2>약국</h2></div>${pharmTabBarHTML()}<div id="pharm-list" class="queue"><div class="empty-note">${t('loading')}</div></div>`;

  if(pharmTab === 'all'){
    getTodayVisitedPatients().then(list=>{
      const el = document.getElementById('pharm-list');
      if(!el) return;
      if(list.length === 0){ el.innerHTML = '<div class="empty-note">오늘 진료받은 환자가 없습니다.</div>'; return; }
      el.innerHTML = list.map(v=>`<div class="queue-card" onclick="openChartSafely('${v.patientId}')">
        <div class="qc-info">
          <div class="name">${v.name}</div>
          <div class="meta">${v.gender||''} · ${ageLabel(v.age)} · ${v.siteName}</div>
        </div>
        <div class="qc-regno mono">${v.regNo}</div>
      </div>`).join('');
    }).catch(err=>{
      const el = document.getElementById('pharm-list');
      if(el) el.innerHTML = `<div class="empty-note">목록을 불러오지 못했습니다. 아래 링크를 눌러 색인을 만들어주세요:<br>${linkify(err.message)}</div>`;
    });
    return;
  }

  if(pharmTab === 'direct'){
    const {startTs, endTs} = getTodayRange();
    db.collectionGroup('visits')
      .where('date','>=',startTs).where('date','<=',endTs)
      .get().then(async snap=>{
        const list = document.getElementById('pharm-list');
        if(!list) return;
        const directDocs = snap.docs.filter(v=>{
          const d = v.data();
          return d.dispenseMode === 'direct' && isRealVisitDoc(d) && (d.prescription||'').trim();
        });
        if(directDocs.length === 0){ list.innerHTML = '<div class="empty-note">오늘 진료실에서 바로 투약 완료된 처방이 없습니다.</div>'; return; }
        const uniquePatientIds = [...new Set(directDocs.map(v=>v.ref.parent.parent.id))];
        const patientDocs = await Promise.all(uniquePatientIds.map(pid=>db.collection('patients').doc(pid).get()));
        const patientMap = {};
        patientDocs.forEach(d=>{ if(d.exists) patientMap[d.id] = d.data(); });
        const sorted = directDocs.slice().sort((a,b)=>{
          const ta = a.data().date && a.data().date.toMillis ? a.data().date.toMillis() : 0;
          const tb = b.data().date && b.data().date.toMillis ? b.data().date.toMillis() : 0;
          return tb - ta;
        });
        list.innerHTML = sorted.map(v=>{
          const pid = v.ref.parent.parent.id;
          const p = patientMap[pid] || {};
          return `<div class="queue-card" style="flex-wrap:wrap; cursor:pointer;" onclick="togglePharmRx('direct-${v.id}')">
            <div class="qc-info">
              <div class="name">${p.name||'(알 수 없음)'}${testBadgeHTML(p.testPatient)} <span class="pharm-status">진료실 투약 완료</span></div>
              <div class="meta">${p.regNo||'-'} · ${p.siteName||'-'} · <span style="text-decoration:underline;">처방 보기</span></div>
            </div>
            <div id="pharm-rx-direct-${v.id}" style="display:none; width:100%; font-size:12.5px; color:var(--ink-soft); margin-top:8px; padding-top:8px; border-top:1px solid var(--line);">${pharmRxDisplayHTML(v.data().prescriptionItems, v.data().prescription)}</div>
          </div>`;
        }).join('');
      }).catch(err=>{
        const list = document.getElementById('pharm-list');
        if(list) list.innerHTML = `<div class="empty-note">목록을 불러오지 못했습니다. 아래 링크를 눌러 색인을 만들어주세요:<br>${linkify(err.message)}</div>`;
      });
    return;
  }

  if(pharmTab === 'dispensed'){
    const {startTs, endTs} = getTodayRange();
    db.collection('pharmacyQueue')
      .where('status','==','dispensed')
      .where('dispensedAt','>=',startTs).where('dispensedAt','<=',endTs)
      .orderBy('dispensedAt','desc')
      .get().then(snap=>{
        const list = document.getElementById('pharm-list');
        if(!list) return;
        if(snap.empty){ list.innerHTML = '<div class="empty-note">오늘 완료된 투약이 없습니다.</div>'; return; }
        list.innerHTML = snap.docs.map(d=>{
          const p = d.data();
          return `<div class="queue-card" style="flex-wrap:wrap; cursor:pointer;" onclick="togglePharmRx('${d.id}')">
            <div class="qc-info">
              <div class="name">${p.patientName}${testBadgeHTML(p.testPatient)} <span class="pharm-status">완료</span></div>
              <div class="meta">${p.regNo} · ${p.siteName} · ${p.dispensedBy?('투약: '+p.dispensedBy):''} · <span style="text-decoration:underline;">처방 보기</span></div>
            </div>
            <div id="pharm-rx-${d.id}" style="display:none; width:100%; font-size:12.5px; color:var(--ink-soft); margin-top:8px; padding-top:8px; border-top:1px solid var(--line);">${pharmRxDisplayHTML(p.prescriptionItems, p.prescription)}</div>
          </div>`;
        }).join('');
      }).catch(err=>{
        const list = document.getElementById('pharm-list');
        if(list) list.innerHTML = `<div class="empty-note">목록을 불러오지 못했습니다. 아래 링크를 눌러 색인을 만들어주세요:<br>${linkify(err.message)}</div>`;
      });
    return;
  }

  // 조제 대기(waiting) / 투약 대기(prepared)
  unsubscribeQueue = db.collection('pharmacyQueue')
    .where('status','==',pharmTab)
    .orderBy('createdAt','asc')
    .onSnapshot(snap=>{
      const list = document.getElementById('pharm-list');
      if(!list) return;
      if(snap.empty){ list.innerHTML = `<div class="empty-note">${pharmTab==='waiting'?'조제 대기중인':'투약 대기중인'} 처방이 없습니다.</div>`; return; }
      list.innerHTML = snap.docs.map(d=>{
        const p = d.data();
        const statusLabel = p.status==='waiting' ? '조제대기' : '투약대기';
        const nextLabel = p.status==='waiting' ? '조제완료 처리' : '투약/복약지도 완료';
        return `<div class="queue-card" style="flex-wrap:wrap; cursor:pointer;" onclick="togglePharmRx('${d.id}')">
          <div class="qc-info">
            <div class="name">${p.patientName}${testBadgeHTML(p.testPatient)} <span class="pharm-status">${statusLabel}</span></div>
            <div class="meta">${p.regNo} · ${p.siteName} · <span style="text-decoration:underline;">처방 보기</span></div>
          </div>
          ${canEditArea('pharmacy') ? `<button class="btn small" onclick="event.stopPropagation(); advancePharmacy('${d.id}','${p.status}')">${nextLabel}</button>` : ''}
          <div id="pharm-rx-${d.id}" style="display:none; width:100%; font-size:12.5px; color:var(--ink-soft); margin-top:8px; padding-top:8px; border-top:1px solid var(--line);">${pharmRxDisplayHTML(p.prescriptionItems, p.prescription)}</div>
        </div>`;
      }).join('');
    }, err=>{
      const list = document.getElementById('pharm-list');
      if(list) list.innerHTML = `<div class="empty-note">목록을 불러오지 못했습니다. 아래 링크를 눌러 색인을 만들어주세요:<br>${linkify(err.message)}</div>`;
    });
}

function pharmRxDisplayHTML(items, text){
  if(items && items.length) return rxItemsToTableHTML(items, true);
  return `<p style="white-space:pre-wrap; margin:0;">${text || '(처방 내용 없음)'}</p>`;

function togglePharmRx(id){
  const el = document.getElementById(`pharm-rx-${id}`);
  if(el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

async function advancePharmacy(id, currentStatus){
  const who = prompt('처리자 이름을 입력하세요 (약사명)');
  if(!who) return;
  const next = currentStatus === 'waiting' ? 'prepared' : 'dispensed';
  const logField = next === 'prepared' ? 'preparedBy' : 'dispensedBy';
  const timeField = next === 'prepared' ? 'preparedAt' : 'dispensedAt';
  try{
    await db.collection('pharmacyQueue').doc(id).update({
      status: next,
      [logField]: who,
      [timeField]: firebase.firestore.FieldValue.serverTimestamp()
    });
  }catch(err){
    alert('처리 실패: ' + err.message);
  }
}

function toggleStatsVisitList(filter){
  filter = filter || 'all';
  const card = document.getElementById('stats-visit-list-card');
  const holder = document.getElementById('stats-visit-list');
  const titleEl = document.getElementById('stats-visit-list-title');
  if(!card) return;
  if(card.style.display !== 'none' && statsListFilter === filter){
    card.style.display = 'none';
    return;
  }
  statsListFilter = filter;
  const titleMap = {all:'전체', new:'신환', return:'재진'};
  if(titleEl) titleEl.textContent = `기간 내 진료 명단 (${titleMap[filter]})`;
  const list = filter==='all' ? statsVisitList
    : filter==='new' ? statsVisitList.filter(v=>v.isNew)
    : statsVisitList.filter(v=>!v.isNew);
  if(list.length === 0){
    holder.innerHTML = '<div class="empty-note">해당하는 환자가 없습니다.</div>';
  } else {
    holder.innerHTML = list.map(v => `
      <div class="queue-card" onclick="closeStatsAndOpenChart('${v.patientId}')">
        <div class="qc-info">
          <div class="name">${v.name} ${v.isNew?'<span class="pharm-status">신환</span>':''}</div>
          <div class="meta">${v.siteName} · ${fmtDate(v.date)}${v.deptCount>1?` · 진료과 ${v.deptCount}건 (${v.deptNames})`:''}</div>

          <div style="font-size:11px; color:var(--ink-soft); margin-top:3px; white-space:nowrap;">${v.currentStatus||''}</div>
        </div>
      </div>
    `).join('');
  }
  card.style.display = 'block';
  card.scrollIntoView({behavior:'smooth', block:'start'});
}

function getStatsRangeDates(){
  const now = new Date();
  let start, end;
  if(statsRangeType==='day'){
    start = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    end = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23,59,59);
  } else if(statsRangeType==='week'){
    const day = now.getDay();
    start = new Date(now.getFullYear(), now.getMonth(), now.getDate()-day);
    end = new Date(start.getFullYear(), start.getMonth(), start.getDate()+6, 23,59,59);
  } else if(statsRangeType==='month'){
    start = new Date(now.getFullYear(), now.getMonth(), 1);
    end = new Date(now.getFullYear(), now.getMonth()+1, 0, 23,59,59);
  } else {
    const s = statsCustomStart || now.toISOString().slice(0,10);
    const e = statsCustomEnd || now.toISOString().slice(0,10);
    start = new Date(s + 'T00:00:00');
    end = new Date(e + 'T23:59:59');
  }
  return {start, end};
}

async function loadStats(){
  if(statsTab === 'lab') return loadLabStats();
  if(statsTab === 'pharmacy') return loadPharmacyStats();
  return loadClinicStats();
}

async function loadClinicStats(){
  const body = document.getElementById('stats-body');
  if(!body) return;
  body.innerHTML = `<div class="empty-note">${t('loading')}</div>`;
  try{
    const {start, end} = getStatsRangeDates();
    const startTs = firebase.firestore.Timestamp.fromDate(start);
    const endTs = firebase.firestore.Timestamp.fromDate(end);

    // 전체 누적 통계 (기간과 무관, 사이트/연령/만성질환 현황 파악용) - 테스트용 환자는 제외
    const patientsSnapAll = await db.collection('patients').get();
    const siteFiltered = statsSiteFilter==='all' ? patientsSnapAll.docs : patientsSnapAll.docs.filter(d=>d.data().siteId===statsSiteFilter);
    const patients = siteFiltered.filter(d=>!d.data().testPatient).map(d=>d.data());
    const bySite = {};
    const byAgeGroup = {'0-9':0,'10-19':0,'20-39':0,'40-59':0,'60+':0};
    let htn=0, dm=0;
    patients.forEach(p=>{
      bySite[p.siteName] = (bySite[p.siteName]||0) + 1;
      const age = parseAgeYears(p.age);
      if(!isNaN(age)){
        if(age<10) byAgeGroup['0-9']++;
        else if(age<20) byAgeGroup['10-19']++;
        else if(age<40) byAgeGroup['20-39']++;
        else if(age<60) byAgeGroup['40-59']++;
        else byAgeGroup['60+']++;
      }
      if(p.history?.hypertension) htn++;
      if(p.history?.diabetes) dm++;
    });

    // 기간 내 전체 방문(진료) 기록 - collectionGroup 조회
    // 접수 시 자동 생성되는 "(초진 등록)" 스텁이나 빈 프로그레스 노트는 실제 진료로 세지 않음
    const visitsSnapRaw = await db.collectionGroup('visits')
      .where('date','>=',startTs).where('date','<=',endTs).get();

    const patientMap = {};
    patientsSnapAll.docs.forEach(d => { patientMap[d.id] = d.data(); });

    const realVisitDocs = visitsSnapRaw.docs.filter(v=>{
      if(!isRealVisitDoc(v.data())) return false;
      const patientId = v.ref.parent.parent.id;
      const pat = patientMap[patientId];
      if(!pat || pat.testPatient) return false;
      if(statsSiteFilter!=='all' && pat.siteId !== statsSiteFilter) return false;
      return true;
    });
    const sessionCount = realVisitDocs.length; // 접수 건수 (한 번의 접수 = 여러 과가 봤어도 문서 1건)
    // 진료 건수: 한 세션 안에 여러 진료과가 이어서 본 경우 그 과 수만큼 센다 (예: 내과+안과 1명 = 접수 1건, 진료 2건)
    const deptVisitCount = realVisitDocs.reduce((sum, v)=>{
      const de = v.data().deptEntries;
      return sum + (Array.isArray(de) && de.length ? de.length : 1);
    }, 0);

    // 신환 판정: "선택한 기간에 등록됐는지"가 아니라 "이 방문이 그 환자의 평생 첫 실제 진료인지"로 판단.
    // 이렇게 해야 '오늘/이번 주/이번 달' 중 무엇을 눌러도 같은 방문 기록이 항상 같은 결과(신환 또는 재진)로 나옴.
    // 날짜 숫자 비교 대신 문서 ID를 직접 비교해서, 시간 정밀도 오차로 인한 오분류를 원천 차단함.
    const uniquePatientIds = [...new Set(realVisitDocs.map(v => v.ref.parent.parent.id))];
    const firstRealVisitIdMap = {};
    await Promise.all(uniquePatientIds.map(async pid=>{
      const pat = patientMap[pid];
      if(!pat || pat.imported || pat.testPatient) return; // 가져온 환자·테스트 환자는 항상 재진 취급
      const snap = await db.collection('patients').doc(pid).collection('visits')
        .orderBy('date','asc').limit(20).get();
      for(const d of snap.docs){
        if(isRealVisitDoc(d.data())){
          firstRealVisitIdMap[pid] = d.id;
          break;
        }
      }
    }));

    // 명단에 표시할 "현재 상황" 계산용: 지금 이 순간 대기중/진료중인 접수 건, 조제·투약 대기중인 약국 건을 조회
    const liveWaitingSnap = await db.collection('waitingList').where('status','in',['waiting','inProgress']).get();
    const liveWaitingMap = {};
    liveWaitingSnap.docs.forEach(d=>{ liveWaitingMap[d.data().patientId] = d.data().status; });
    const livePharmSnap = await db.collection('pharmacyQueue').where('status','in',['waiting','prepared']).get();
    const livePharmMap = {};
    livePharmSnap.docs.forEach(d=>{ livePharmMap[d.data().patientId] = d.data().status; });
    function currentStatusLabel(patientId){
      if(liveWaitingMap[patientId] === 'waiting') return '진료 대기중';
      if(liveWaitingMap[patientId] === 'inProgress') return '진료중';
      if(livePharmMap[patientId] === 'waiting') return '조제 대기';
      if(livePharmMap[patientId] === 'prepared') return '투약 대기';
      return '진료 및 투약 완료';
    }

    statsVisitList = realVisitDocs.map(v=>{
      const patientId = v.ref.parent.parent.id;
      const p = patientMap[patientId] || {};
      const isNew = firstRealVisitIdMap[patientId] !== undefined && v.id === firstRealVisitIdMap[patientId];
      const deptEntries = Array.isArray(v.data().deptEntries) ? v.data().deptEntries : [];
      return {
        patientId, name: p.name||'(알 수 없음)', regNo: p.regNo||'-', siteName: p.siteName||'-',
        date: v.data().date, progressNote: v.data().progressNote||'', isNew,
        deptCount: deptEntries.length || 1,
        deptNames: deptEntries.length ? deptEntries.map(e=>e.deptName).join(', ') : '',
        currentStatus: currentStatusLabel(patientId)
      };
    }).sort((a,b)=>{
      const ta = a.date?.toDate ? a.date.toDate().getTime() : 0;
      const tb = b.date?.toDate ? b.date.toDate().getTime() : 0;
      return tb - ta;
    });

    // 신환/재진은 "접수 건수" 기준(한 세션은 신환이든 재진이든 하나로만 집계)
    const newInRange = statsVisitList.filter(v=>v.isNew).length;
    const returnVisitsInRange = sessionCount - newInRange;

    // "진료 건수"를 눌렀을 때 과별로 골라볼 수 있도록, 방문 문서 하나당 진료과 수만큼 행을 풀어서 만들어둔다.
    statsDeptVisitList = [];
    realVisitDocs.forEach(v=>{
      const patientId = v.ref.parent.parent.id;
      const p = patientMap[patientId] || {};
      const de = Array.isArray(v.data().deptEntries) ? v.data().deptEntries : null;
      if(de && de.length){
        de.forEach(e=>{
          statsDeptVisitList.push({
            patientId, name: p.name||'(알 수 없음)', regNo: p.regNo||'-', siteName: p.siteName||'-',
            date: v.data().date, deptName: e.deptName||'일반진료', doctorName: e.doctorName||'',
            currentStatus: currentStatusLabel(patientId)
          });
        });
      } else {
        statsDeptVisitList.push({
          patientId, name: p.name||'(알 수 없음)', regNo: p.regNo||'-', siteName: p.siteName||'-',
          date: v.data().date, deptName: '(과 정보 없음)', doctorName: '',
          currentStatus: currentStatusLabel(patientId)
        });
      }
    });



    let rxCount = {};
    realVisitDocs.forEach(v=>{
      const rx = (v.data().prescription||'').trim();
      if(rx) rx.split('\\n').forEach(line=>{
        const l = line.trim();
        if(l) rxCount[l] = (rxCount[l]||0) + 1;
      });
    });
    const topRx = Object.entries(rxCount).sort((a,b)=>b[1]-a[1]).slice(0,5);

    // 다빈도 진단명: 향후 진료 계획(약품 재고, 인력 배치 등)에 참고할 수 있도록 진단명 코드 기준으로 집계
    const dxCount = {};
    realVisitDocs.forEach(v=>{
      const de = v.data().deptEntries;
      const diagLists = Array.isArray(de) ? de.map(e=>e.diagnoses||[]) : [];
      diagLists.flat().forEach(dx=>{
        if(!dx || !dx.ko) return;
        dxCount[dx.ko] = (dxCount[dx.ko]||0) + 1;
      });
    });
    const topDx = Object.entries(dxCount).sort((a,b)=>b[1]-a[1]).slice(0,8);

    const siteRows = Object.entries(bySite).map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
    const ageRows = Object.entries(byAgeGroup).map(([k,v])=>`<tr><td>${k}세</td><td>${v}</td></tr>`).join('');
    const rxRows = topRx.map(([k,v])=>`<tr><td>${k.slice(0,25)}</td><td>${v}</td></tr>`).join('') || '<tr><td colspan="2">데이터 없음</td></tr>';

    const rangeLabel = `${start.toISOString().slice(0,10)} ~ ${end.toISOString().slice(0,10)}`;
    const siteLabel = statsSiteFilter==='all' ? '전체 사이트' : (sites.find(s=>s.id===statsSiteFilter)?.name || '전체 사이트');

    body.innerHTML = `
      <div class="note">선택 사이트: ${siteLabel} · 선택 기간: ${rangeLabel} (접수·신환·재진·진료건수는 이 기간 기준, 사이트/연령/만성질환 표는 전체 누적 기준)</div>
      <div class="card" style="margin-bottom:16px;">
        <h3>기간 내 진료 현황 (숫자를 눌러서 명단 보기)</h3>
        <div style="display:grid; grid-template-columns:repeat(2,1fr); gap:10px;">
          <div style="text-align:center; padding:8px; background:var(--paper); border-radius:8px; cursor:pointer;" onclick="toggleStatsVisitList('all')">
            <div style="font-size:26px; font-weight:700; font-family:ui-monospace,monospace;">${sessionCount}</div>
            <div style="font-size:12px; color:var(--ink-soft);">접수 건수</div>
          </div>
          <div style="text-align:center; padding:8px; background:var(--paper); border-radius:8px; cursor:pointer;" onclick="showDeptVisitPicker()">
            <div style="font-size:26px; font-weight:700; font-family:ui-monospace,monospace;">${deptVisitCount}</div>
            <div style="font-size:12px; color:var(--ink-soft);">진료 건수 (진료과 합계)</div>
          </div>
          <div style="text-align:center; padding:8px; background:var(--paper); border-radius:8px; cursor:pointer;" onclick="toggleStatsVisitList('new')">
            <div style="font-size:26px; font-weight:700; font-family:ui-monospace,monospace;">${newInRange}</div>
            <div style="font-size:12px; color:var(--ink-soft);">신환</div>
          </div>
          <div style="text-align:center; padding:8px; background:var(--paper); border-radius:8px; cursor:pointer;" onclick="toggleStatsVisitList('return')">
            <div style="font-size:26px; font-weight:700; font-family:ui-monospace,monospace;">${returnVisitsInRange}</div>
            <div style="font-size:12px; color:var(--ink-soft);">재진</div>
          </div>
        </div>
        <div class="note" style="margin-top:8px;">한 분이 여러 진료과를 거치면 접수 건수는 1건, 진료 건수는 거친 과 수만큼(예: 2과 → 2건) 집계됩니다.</div>
      </div>
      <div class="grid2" style="margin-bottom:16px;">
        <div class="card"><h3>${siteLabel} 누적 등록</h3>
          <div style="font-size:30px; font-weight:700; font-family:ui-monospace,monospace;">${patients.length}<span style="font-size:13px; color:var(--ink-soft);"> 명</span></div>
          <div style="font-size:12px; color:var(--ink-soft); margin-top:6px;">고혈압 ${htn}명 · 당뇨 ${dm}명</div>
        </div>
        <div class="card"><h3>사이트별 등록 수${statsSiteFilter==='all'?' (전체)':''}</h3><table class="chronic-table"><tr><th>사이트</th><th>명</th></tr>${siteRows}</table></div>
      </div>
      <div class="card" id="stats-visit-list-card" style="display:none;">
        <h3 id="stats-visit-list-title">기간 내 진료 명단</h3>
        <div id="stats-visit-list"></div>
      </div>
      <div class="card" style="margin-bottom:16px;">
        <h3>연령별 통계 (${siteLabel})</h3>
        <table class="chronic-table"><tr><th>연령대</th><th>명</th></tr>${ageRows}</table>
      </div>
      <div class="grid2">
        <div class="card"><h3>다빈도 처방 (기간 내, 상위 5)</h3><table class="chronic-table"><tr><th>처방 내용</th><th>건수</th></tr>${rxRows}</table></div>
        <div class="card"><h3>다빈도 진단명 (기간 내, 상위 8)</h3><table class="chronic-table"><tr><th>진단명</th><th>건수</th></tr>${topDx.map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('') || '<tr><td colspan="2">진단명이 입력된 기록이 없습니다</td></tr>'}</table>
          <div class="note" style="margin-top:8px;">진단명은 진료 시 "진단명 검색"에서 선택해야 여기 집계됩니다. 계절별 추세를 파악하면 다음 단기팀 방문 때 준비할 약품·인력을 미리 계획하는 데 참고할 수 있습니다.</div>
        </div>
      </div>
    `;
  }catch(err){
    body.innerHTML = `<div class="empty-note">통계를 불러오지 못했습니다. Firestore 색인이 필요할 수 있습니다.<br>${linkify(err.message)}</div>`;
  }
}

// 검사실 통계: 이 기간에 들어온 검사 처방 건수, 상태별 현황, 어느 과에서 많이 의뢰했는지,
// 어떤 검사가 자주 나가는지, 검사 접수부터 결과 완료까지 평균 처리 시간을 보여준다.
async function loadLabStats(){
  const body = document.getElementById('stats-body');
  if(!body) return;
  body.innerHTML = `<div class="empty-note">${t('loading')}</div>`;
  try{
    const {start, end} = getStatsRangeDates();
    const startTs = firebase.firestore.Timestamp.fromDate(start);
    const endTs = firebase.firestore.Timestamp.fromDate(end);
    const snap = await db.collection('labQueue').where('createdAt','>=',startTs).where('createdAt','<=',endTs).get();
    let docs = snap.docs.map(d=>d.data()).filter(d=>!d.testPatient); // 테스트 환자는 통계에서 항상 제외
    if(statsSiteFilter!=='all'){
      const siteName = sites.find(s=>s.id===statsSiteFilter)?.name;
      docs = docs.filter(d=>d.siteName===siteName);
    }
    const total = docs.length;
    const pending = docs.filter(d=>d.status!=='done').length;
    const done = docs.filter(d=>d.status==='done').length;

    const byDept = {};
    const byItem = {};
    let turnaroundSum = 0, turnaroundCount = 0;
    docs.forEach(d=>{
      byDept[d.deptName||'(과 정보 없음)'] = (byDept[d.deptName||'(과 정보 없음)']||0) + 1;
      (d.items||[]).forEach(it=>{ byItem[it.name] = (byItem[it.name]||0) + 1; });
      if(d.status==='done' && d.createdAt?.toDate && d.completedAt?.toDate){
        turnaroundSum += (d.completedAt.toDate().getTime() - d.createdAt.toDate().getTime());
        turnaroundCount++;
      }
    });
    const avgTurnaroundMin = turnaroundCount ? Math.round(turnaroundSum / turnaroundCount / 60000) : null;
    const deptRows = Object.entries(byDept).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('') || '<tr><td colspan="2">데이터 없음</td></tr>';
    const itemRows = Object.entries(byItem).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('') || '<tr><td colspan="2">데이터 없음</td></tr>';
    // 24시간 이상 결과가 안 들어온 검사 건수 (병목/누락 파악용 — 오늘 통계일 때 특히 유용)
    const nowMs = Date.now();
    const overdueCount = docs.filter(d=>d.status!=='done' && d.createdAt?.toDate && (nowMs - d.createdAt.toDate().getTime()) > 24*3600*1000).length;

    const rangeLabel = `${start.toISOString().slice(0,10)} ~ ${end.toISOString().slice(0,10)}`;
    const siteLabel = statsSiteFilter==='all' ? '전체 사이트' : (sites.find(s=>s.id===statsSiteFilter)?.name || '전체 사이트');

    body.innerHTML = `
      <div class="note">선택 사이트: ${siteLabel} · 선택 기간: ${rangeLabel}</div>
      <div class="card" style="margin-bottom:16px;">
        <h3>검사실 처리 현황</h3>
        <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px;">
          <div style="text-align:center; padding:8px; background:var(--paper); border-radius:8px;">
            <div style="font-size:26px; font-weight:700; font-family:ui-monospace,monospace;">${total}</div>
            <div style="font-size:12px; color:var(--ink-soft);">총 검사 처방</div>
          </div>
          <div style="text-align:center; padding:8px; background:var(--paper); border-radius:8px;">
            <div style="font-size:26px; font-weight:700; font-family:ui-monospace,monospace;">${done}</div>
            <div style="font-size:12px; color:var(--ink-soft);">결과 완료</div>
          </div>
          <div style="text-align:center; padding:8px; background:var(--paper); border-radius:8px;">
            <div style="font-size:26px; font-weight:700; font-family:ui-monospace,monospace;">${pending}</div>
            <div style="font-size:12px; color:var(--ink-soft);">대기중</div>
          </div>
        </div>
        <div class="note" style="margin-top:8px;">${avgTurnaroundMin!==null ? `검사 의뢰부터 결과 완료까지 평균 ${avgTurnaroundMin}분 소요` : '완료된 검사가 없어 평균 처리 시간을 계산할 수 없습니다'}${overdueCount>0 ? ` · ⚠️ 24시간 넘게 결과가 안 들어온 검사 ${overdueCount}건 (검사실 화면에서 확인 필요)` : ''}</div>
      </div>
      <div class="grid2" style="margin-bottom:16px;">
        <div class="card"><h3>진료과별 검사 의뢰</h3><table class="chronic-table"><tr><th>진료과</th><th>건수</th></tr>${deptRows}</table></div>
        <div class="card"><h3>자주 나가는 검사 (상위 10)</h3><table class="chronic-table"><tr><th>검사명</th><th>건수</th></tr>${itemRows}</table></div>
      </div>
    `;
  }catch(err){
    body.innerHTML = `<div class="empty-note">검사실 통계를 불러오지 못했습니다. Firestore 색인이 필요할 수 있습니다.<br>${linkify(err.message)}</div>`;
  }
}

// 약국 통계: 약국으로 전송된 처방(pharmacyQueue) + 진료실에서 바로 투약 처리한 처방(direct)을 합쳐서
// 전체 처방/투약 현황과 자주 나가는 약, 조제~투약까지 평균 처리 시간을 보여준다.
async function loadPharmacyStats(){
  const body = document.getElementById('stats-body');
  if(!body) return;
  body.innerHTML = `<div class="empty-note">${t('loading')}</div>`;
  try{
    const {start, end} = getStatsRangeDates();
    const startTs = firebase.firestore.Timestamp.fromDate(start);
    const endTs = firebase.firestore.Timestamp.fromDate(end);

    const pharmSnap = await db.collection('pharmacyQueue').where('createdAt','>=',startTs).where('createdAt','<=',endTs).get();
    let pharmDocs = pharmSnap.docs.map(d=>d.data()).filter(d=>!d.testPatient); // 테스트 환자는 통계에서 항상 제외
    if(statsSiteFilter!=='all'){
      const siteName = sites.find(s=>s.id===statsSiteFilter)?.name;
      pharmDocs = pharmDocs.filter(d=>d.siteName===siteName);
    }

    // 직접투약분은 visits 문서 자체에 testPatient 필드가 없으므로, 환자 문서를 조회해 테스트 환자를 걸러낸다.
    const directSnap = await db.collectionGroup('visits').where('date','>=',startTs).where('date','<=',endTs).get();
    const directCandidates = directSnap.docs.filter(v=>{
      const d = v.data();
      return d.dispenseMode === 'direct' && isRealVisitDoc(d) && (d.prescription||'').trim();
    });
    const directPatientIds = [...new Set(directCandidates.map(v=>v.ref.parent.parent.id))];
    const allPatientsForFilter = await getAllPatientsCached(); // 1분 캐시된 전체 환자 목록 재사용 (건별로 서버 조회하지 않음 → 훨씬 빠름)
    const directPatientMap = {};
    allPatientsForFilter.forEach(p=>{ if(directPatientIds.includes(p.id)) directPatientMap[p.id] = p; });
    const directDocs = directCandidates.filter(v=>{
      const pat = directPatientMap[v.ref.parent.parent.id];
      return !(pat && pat.testPatient);
    }).map(v=>v.data());

    const totalPharmacyRoute = pharmDocs.length;
    const totalDirectRoute = directDocs.length;
    const waiting = pharmDocs.filter(d=>d.status==='waiting').length;
    const prepared = pharmDocs.filter(d=>d.status==='prepared').length;
    const dispensed = pharmDocs.filter(d=>d.status==='dispensed').length;

    let turnaroundSum = 0, turnaroundCount = 0;
    pharmDocs.forEach(d=>{
      if(d.dispensedAt?.toDate && d.createdAt?.toDate){
        turnaroundSum += (d.dispensedAt.toDate().getTime() - d.createdAt.toDate().getTime());
        turnaroundCount++;
      }
    });
    const avgTurnaroundMin = turnaroundCount ? Math.round(turnaroundSum / turnaroundCount / 60000) : null;

    const drugCount = {};
    const tally = (items, text)=>{
      if(items && items.length){
        items.forEach(it=>{ if(it.drug) drugCount[it.drug] = (drugCount[it.drug]||0) + 1; });
      } else if(text){
        text.split('\n').forEach(line=>{
          const name = line.trim().split(' ')[0];
          if(name) drugCount[name] = (drugCount[name]||0) + 1;
        });
      }
    };
    pharmDocs.forEach(d=>tally(d.prescriptionItems, d.prescription));
    directDocs.forEach(d=>tally(d.prescriptionItems, d.prescription));
    const drugRows = Object.entries(drugCount).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('') || '<tr><td colspan="2">데이터 없음</td></tr>';

    // 처방 1건당 평균 약품 수 (다제복용 경향 파악 — 만성질환 관리 계획에 참고)
    const allRxDocs = pharmDocs.concat(directDocs);
    const totalDrugLines = allRxDocs.reduce((sum,d)=> sum + (Array.isArray(d.prescriptionItems) && d.prescriptionItems.length ? d.prescriptionItems.length : ((d.prescription||'').trim() ? (d.prescription||'').split('\n').filter(l=>l.trim()).length : 0)), 0);
    const avgDrugsPerRx = allRxDocs.length ? (totalDrugLines / allRxDocs.length).toFixed(1) : null;

    const rangeLabel = `${start.toISOString().slice(0,10)} ~ ${end.toISOString().slice(0,10)}`;
    const siteLabel = statsSiteFilter==='all' ? '전체 사이트' : (sites.find(s=>s.id===statsSiteFilter)?.name || '전체 사이트');

    body.innerHTML = `
      <div class="note">선택 사이트: ${siteLabel} · 선택 기간: ${rangeLabel}</div>
      <div class="card" style="margin-bottom:16px;">
        <h3>처방 경로별 현황</h3>
        <div style="display:grid; grid-template-columns:repeat(2,1fr); gap:10px;">
          <div style="text-align:center; padding:8px; background:var(--paper); border-radius:8px;">
            <div style="font-size:26px; font-weight:700; font-family:ui-monospace,monospace;">${totalPharmacyRoute}</div>
            <div style="font-size:12px; color:var(--ink-soft);">약국 전송분 (단기팀)</div>
          </div>
          <div style="text-align:center; padding:8px; background:var(--paper); border-radius:8px;">
            <div style="font-size:26px; font-weight:700; font-family:ui-monospace,monospace;">${totalDirectRoute}</div>
            <div style="font-size:12px; color:var(--ink-soft);">진료실 직접투약</div>
          </div>
        </div>
      </div>
      <div class="card" style="margin-bottom:16px;">
        <h3>약국 전송분 처리 현황</h3>
        <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px;">
          <div style="text-align:center; padding:8px; background:var(--paper); border-radius:8px;">
            <div style="font-size:22px; font-weight:700; font-family:ui-monospace,monospace;">${waiting}</div>
            <div style="font-size:12px; color:var(--ink-soft);">조제 대기</div>
          </div>
          <div style="text-align:center; padding:8px; background:var(--paper); border-radius:8px;">
            <div style="font-size:22px; font-weight:700; font-family:ui-monospace,monospace;">${prepared}</div>
            <div style="font-size:12px; color:var(--ink-soft);">투약 대기</div>
          </div>
          <div style="text-align:center; padding:8px; background:var(--paper); border-radius:8px;">
            <div style="font-size:22px; font-weight:700; font-family:ui-monospace,monospace;">${dispensed}</div>
            <div style="font-size:12px; color:var(--ink-soft);">투약 완료</div>
          </div>
        </div>
        <div class="note" style="margin-top:8px;">${avgTurnaroundMin!==null ? `처방 접수부터 투약 완료까지 평균 ${avgTurnaroundMin}분 소요` : '투약 완료된 건이 없어 평균 처리 시간을 계산할 수 없습니다'}</div>
      </div>
      <div class="card"><h3>자주 나가는 약 (상위 10, 약국+직접투약 합산)</h3><table class="chronic-table"><tr><th>약품명</th><th>건수</th></tr>${drugRows}</table>
        <div class="note" style="margin-top:8px;">${avgDrugsPerRx!==null ? `처방 1건당 평균 ${avgDrugsPerRx}개 약품 · 총 ${allRxDocs.length}건 기준 (다제복용 경향 및 재고 소요량 예측에 참고)` : '집계할 처방 데이터가 없습니다'}</div>
      </div>
    `;
  }catch(err){
    body.innerHTML = `<div class="empty-note">약국 통계를 불러오지 못했습니다. Firestore 색인이 필요할 수 있습니다.<br>${linkify(err.message)}</div>`;
  }
}

/* =========================================================
   13. Gemini 의학 Q&A / 번역 위젯
   ========================================================= */
function toggleGemini(){
  document.getElementById('gemini-panel').classList.toggle('open');
}

async function sendGemini(){
  const input = document.getElementById('gemini-input');
  const question = input.value.trim();
  if(!question) return;
  const body = document.getElementById('gemini-body');
  body.innerHTML += `<div class="gemini-bubble me">${question}</div>`;
  input.value = '';
  body.scrollTop = body.scrollHeight;

  if(!GEMINI_API_KEY || GEMINI_API_KEY.indexOf('여기에') === 0){
    body.innerHTML += `<div class="gemini-bubble">Gemini API 키가 아직 설정되지 않았습니다. aistudio.google.com 에서 무료 키를 발급받아 코드 상단에 넣어주세요.</div>`;
    body.scrollTop = body.scrollHeight;
    return;
  }

  body.innerHTML += `<div class="gemini-bubble" id="gemini-loading">...</div>`;
  body.scrollTop = body.scrollHeight;

  try{
    const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        contents:[{ parts:[{ text: question }] }]
      })
    });
    const data = await resp.json();
    if(data.error){
      document.getElementById('gemini-loading').outerHTML = `<div class="gemini-bubble">오류: ${data.error.message || JSON.stringify(data.error)}</div>`;
    } else {
      const answer = data?.candidates?.[0]?.content?.parts?.[0]?.text;
      if(answer){
        document.getElementById('gemini-loading').outerHTML = `<div class="gemini-bubble">${answer.replace(/\n/g,'<br>')}</div>`;
      } else {
        document.getElementById('gemini-loading').outerHTML = `<div class="gemini-bubble">예상치 못한 응답입니다.<br><span style="font-size:10px;">${JSON.stringify(data).slice(0,500)}</span></div>`;
      }
    }
  }catch(err){
    const el = document.getElementById('gemini-loading');
    if(el) el.outerHTML = `<div class="gemini-bubble">오류가 발생했습니다: ${err.message}</div>`;
  }
  body.scrollTop = body.scrollHeight;
}
</script>
</body>
