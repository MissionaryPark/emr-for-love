<style>
  :root{
    --teal:#003876; --teal-dark:#00224A; --paper:#EEF2F7; --ink:#1B2430;
    --ink-soft:#3D4653; --rust:#C0392B; --sage:#2E7D57; --line:#D8DEE6; --bg:#F7F9FB; --white:#FFFFFF;
    --sky:#4F86C6;
  }
  *{box-sizing:border-box;}
  body{margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif; background:var(--bg); color:var(--ink);}
  .mono{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;}

  /* ---- login ---- */
  #login-screen{display:flex; align-items:center; justify-content:center; min-height:100vh;}
  .login-box{background:var(--white); border:1px solid var(--line); border-radius:12px; padding:32px; width:340px;}
  .login-box h1{font-family:-apple-system,"Segoe UI",Roboto,sans-serif; letter-spacing:-0.01em; font-size:19px; margin:0 0 4px;}
  .login-box .sub{font-size:12px; color:var(--ink-soft); margin-bottom:22px;}
  .role-pick{display:flex; gap:8px; margin-bottom:18px;}
  .role-pick .rp{flex:1; text-align:center; padding:12px 4px; border:1px solid var(--line); border-radius:8px; cursor:pointer; font-size:13px;}
  .role-pick .rp.active{background:var(--teal); color:#fff; border-color:var(--teal);}
  .field label{display:block; font-size:12px; color:var(--ink-soft); margin-bottom:4px;}
  .field input, .field select, .field textarea{width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:6px; font-size:14px; font-family:inherit; background:#FEFDFB; margin-bottom:12px;}
  .btn{background:var(--teal); color:#fff; border:none; padding:10px 16px; border-radius:6px; font-size:13.5px; font-weight:600; cursor:pointer; width:100%;}
  .btn:hover{background:var(--teal-dark);}
  .btn.small{padding:6px 10px; font-size:12px; width:auto;}
  .btn.outline{background:transparent; color:var(--teal); border:1px solid var(--teal);}
  #login-error{color:var(--rust); font-size:12px; margin-top:8px; display:none;}

  /* ---- shell ---- */
  #app-shell{display:none;}
  .shell{display:flex; min-height:100vh;}
  .sidebar{width:220px; background:var(--teal-dark); color:#EDEBE3; padding:20px 16px; flex-shrink:0;}
  .sidebar h1{font-size:14px; font-weight:700; margin:0 0 2px; font-family:-apple-system,"Segoe UI",Roboto,sans-serif; letter-spacing:-0.01em;}
  .sidebar .whoami{font-size:11px; opacity:.7; margin-bottom:18px;}
  .site-select{margin-bottom:18px;}
  .site-select label{display:block; font-size:10.5px; text-transform:uppercase; letter-spacing:.08em; opacity:.55; margin-bottom:6px;}
  .site-select select{width:100%; padding:8px; border-radius:6px; border:none; background:#3A6D6A; color:#fff; font-size:13px;}
  .site-manage-link{font-size:11px; color:#B9E0DC; margin-top:6px; cursor:pointer; text-decoration:underline;}
  .nav-item{padding:10px 10px; border-radius:6px; font-size:13.5px; margin-bottom:2px; cursor:pointer; display:flex; align-items:center; gap:8px; color:#D8D6CD;}
  .nav-item.active{background:rgba(243,239,230,.14); color:#fff; font-weight:600;}
  .nav-item:hover{background:rgba(243,239,230,.08);}
  .tab-pill{padding:10px 10px; border-radius:8px; font-size:13.5px; cursor:pointer; color:var(--teal-dark); background:var(--paper); border:1px solid var(--line); font-weight:600;}
  .tab-pill.active{background:var(--teal); color:#fff; border-color:var(--teal);}
  .nav-tag{margin-left:auto; font-size:10.5px; background:var(--rust); color:#fff; padding:1px 6px; border-radius:10px;}
  .logout-link{font-size:11px; color:#D8D6CD; margin-top:24px; cursor:pointer; text-decoration:underline; display:block;}

  .main{flex:1; padding:26px 34px; max-width:1100px;}
  .topbar{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:20px; flex-wrap:wrap; gap:8px;}
  .topbar h2{font-family:-apple-system,"Segoe UI",Roboto,sans-serif; letter-spacing:-0.01em; font-size:21px; margin:0;}

  .card{background:var(--white); border:1px solid var(--line); border-radius:10px; padding:20px 22px; margin-bottom:16px;}
  .card h3{font-size:12.5px; text-transform:uppercase; letter-spacing:.08em; color:var(--teal-dark); font-weight:700; margin:0 0 14px; border-bottom:1px solid var(--line); padding-bottom:8px;}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  @media(max-width:700px){.grid2{grid-template-columns:1fr;} .sidebar{width:100%; position:static;} .shell{flex-direction:column;}}
  .checks{display:flex; flex-wrap:wrap; gap:10px; margin-bottom:12px;}
  .chk{display:flex; align-items:center; gap:6px; font-size:13px; background:var(--paper); padding:6px 10px; border-radius:6px;}

  .queue{display:flex; flex-direction:column; gap:10px;}
  .queue-card{background:var(--white); border:1px solid var(--line); border-left:5px solid var(--teal); border-radius:8px; padding:14px 16px; display:flex; align-items:center; gap:16px; cursor:pointer;}
  .queue-card:hover{box-shadow:0 2px 10px rgba(0,0,0,.06);}
  .qc-info{flex:1;}
  .qc-info .name{font-weight:700; font-size:15px;}
  .qc-info .meta{font-size:12px; color:var(--ink-soft); margin-top:2px;}
  .qc-regno{font-size:12px; padding:3px 8px; border-radius:4px; background:var(--paper); color:var(--teal-dark); font-weight:700;}
  .badge-chronic{font-size:10px; background:#EFE2D0; color:var(--rust); padding:2px 6px; border-radius:4px; margin-left:6px;}
  .empty-note{font-size:13px; color:var(--ink-soft); padding:20px; text-align:center;}

  .chart-head{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:18px; flex-wrap:wrap; gap:10px;}
  .chart-name{font-size:18px; font-weight:700;}
  .chart-meta{font-size:12.5px; color:var(--ink-soft);}
  .tag-row{display:flex; gap:6px; margin-top:6px; flex-wrap:wrap;}
  .tag{font-size:10.5px; padding:2px 7px; border-radius:10px; background:#EFE9DB; color:var(--ink-soft);}
  .tag.warn{background:#F3DCD3; color:var(--rust);}

  .hist-edit-row{display:flex; justify-content:space-between; align-items:center;}
  .hist-edit-toggle{font-size:12px; color:var(--teal); cursor:pointer; font-weight:600;}

  .rx-preset{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px;}
  .rx-chip{background:var(--paper); border:1px solid var(--line); border-radius:16px; padding:5px 12px; font-size:12px; cursor:pointer;}
  .rx-chip:hover{background:#E9E2D2;}

  .chronic-table{width:100%; border-collapse:collapse; font-size:13px;}
  .chronic-table th{text-align:left; font-size:11px; color:var(--ink-soft); text-transform:uppercase; border-bottom:1px solid var(--line); padding:6px 8px;}
  .chronic-table td{padding:7px 8px; border-bottom:1px solid #EFEBE1; font-family:ui-monospace,monospace;}

  .timeline-entry{border-left:2px solid var(--line); padding:2px 0 18px 18px; position:relative; margin-left:6px;}
  .timeline-entry::before{content:""; width:9px; height:9px; border-radius:50%; background:var(--teal); position:absolute; left:-5px; top:5px;}
  .timeline-entry .tdate{font-size:11.5px; color:var(--ink-soft); font-family:ui-monospace,monospace; margin-bottom:4px;}
  .timeline-entry .tsection{font-size:11px; text-transform:uppercase; color:var(--teal-dark); font-weight:700; letter-spacing:.05em; margin-top:8px;}
  .timeline-entry p{margin:3px 0 0; font-size:13.5px; line-height:1.5; white-space:pre-wrap;}

  .site-row{display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border:1px solid var(--line); border-radius:8px; margin-bottom:8px; background:var(--white);}
  .site-row .prefix{font-family:ui-monospace,monospace; font-size:12px; background:var(--paper); padding:3px 8px; border-radius:4px; color:var(--teal-dark);}

  .note{font-size:11.5px; color:var(--ink-soft); background:#FDF6E9; border:1px solid #EADDBC; border-radius:6px; padding:8px 12px; margin-bottom:16px;}
  .vitals-strip{display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap;}
  .vital{background:var(--paper); border-radius:8px; padding:10px 16px; text-align:center; min-width:80px;}
  .vital .v{font-size:18px; font-weight:700; font-family:ui-monospace,monospace;}
  .vital .l{font-size:10px; color:var(--ink-soft); text-transform:uppercase;}

  .attach-row{display:flex; gap:8px; margin-top:6px; flex-wrap:wrap;}
  .attach-chip{font-size:11px; background:var(--paper); padding:4px 9px; border-radius:5px; text-decoration:none; color:var(--teal); display:inline-flex; align-items:center; gap:4px;}
  .attach-chip:hover{background:#E3E9F1;}

  .appt-item{background:var(--white); border:1px solid var(--line); border-left:4px solid var(--teal); border-radius:6px; padding:8px 10px; margin-bottom:8px; font-size:12.5px;}
  .appt-time{font-family:ui-monospace,monospace; font-weight:700; color:var(--teal-dark); font-size:12px; margin-right:6px;}

  .pharm-status{font-size:10px; padding:2px 7px; border-radius:10px; background:var(--paper); color:var(--teal-dark); margin-left:6px;}

  .history-panel{
    position:fixed; top:0; right:-55%; width:50%; height:100%; background:#fff;
    box-shadow:-4px 0 24px rgba(0,0,0,.15); z-index:60; display:flex; flex-direction:column;
    transition:right .25s ease; overflow:hidden;
  }
  .history-panel.open{right:0;}
  .history-panel-head{
    background:var(--teal-dark); color:#fff; padding:14px 20px; display:flex; justify-content:space-between;
    align-items:center; font-weight:700; font-size:14px;
  }
  .history-panel-body{flex:1; overflow-y:auto; padding:18px 22px;}
  @media(max-width:800px){ .history-panel{width:100%; right:-100%;} }
  #msg-toast{display:none; position:fixed; right:16px; bottom:16px; left:auto; width:300px; max-width:calc(100vw - 32px);
    background:var(--white); border:1px solid var(--line); border-left:5px solid var(--teal); border-radius:10px;
    padding:14px 16px; box-shadow:0 8px 24px rgba(0,0,0,0.18); z-index:500; font-size:13px; color:var(--ink);}
  @media(max-width:800px){ #msg-toast{left:10px; right:10px; width:auto; bottom:10px;} }

  .fab{
    position:fixed; bottom:24px; right:24px; width:50px; height:50px; border-radius:50%;
    background:linear-gradient(135deg,#4285F4,#9B72CB); color:#fff; display:flex; align-items:center;
    justify-content:center; font-size:19px; box-shadow:0 4px 14px rgba(0,0,0,.25); cursor:pointer; z-index:50;
  }
  .gemini-panel{
    position:fixed; bottom:86px; right:24px; width:420px; height:560px; background:#fff; border-radius:12px;
    box-shadow:0 8px 30px rgba(0,0,0,.2); display:none; flex-direction:column; overflow:hidden; z-index:50;
  }
  .gemini-panel.open{display:flex;}
  .gemini-head{background:linear-gradient(135deg,#4285F4,#9B72CB); color:#fff; padding:10px 14px; font-size:13px; font-weight:600;}
  .gemini-body{flex:1; padding:12px; font-size:12.5px; color:var(--ink-soft); overflow-y:auto;}
  .gemini-bubble{background:var(--paper); border-radius:8px; padding:8px 10px; margin-bottom:8px; max-width:88%;}
  .gemini-bubble.me{background:#E3ECF7; margin-left:auto;}
  .gemini-input{display:flex; border-top:1px solid var(--line);}
  .gemini-input input{flex:1; border:none; padding:10px; font-size:12.5px;}
  .gemini-input button{background:var(--teal); color:#fff; border:none; padding:0 14px; font-size:12px; cursor:pointer;}

  @media(max-width:700px){
    .fab{bottom:16px; right:16px;}
    .gemini-panel{right:10px; left:10px; width:auto; bottom:76px;}
  }
</style>
</head>
<body>

<!-- ================= LOGIN ================= -->
<div id="login-screen">
  <div class="login-box">
    <div id="pin-gate">
      <h1>EMR for Love</h1>
      <div class="sub">PIN 번호를 입력하세요</div>
      <div class="field"><input id="pin-input" type="tel" autocomplete="off" maxlength="6" placeholder="숫자 입력" style="text-align:center; font-size:20px; letter-spacing:6px;" onkeydown="if(event.key==='Enter') checkPin()"></div>
      <button class="btn" onclick="checkPin()">확인</button>
      <div id="pin-error" style="color:var(--rust); font-size:12px; margin-top:8px; display:none;">PIN 번호가 올바르지 않습니다.</div>
    </div>
    <div id="role-form" style="display:none;">
      <div style="display:flex; justify-content:flex-end; margin-bottom:8px;">
        <select id="lang-select" onchange="setLang(this.value)" style="font-size:11px; padding:4px 6px; border:1px solid var(--line); border-radius:4px;">
          <option value="ko">한국어</option>
          <option value="km">ភាសាខ្មែរ</option>
        </select>
      </div>
      <h1>EMR for Love</h1>
      <div class="sub" id="login-sub">역할을 선택하고 이름을 입력하세요</div>
      <div class="role-pick">
        <div class="rp active" data-role="doctor" onclick="pickRole('doctor')" id="rp-doctor">진료실</div>
        <div class="rp" data-role="reception" onclick="pickRole('reception')" id="rp-reception">접수</div>
        <div class="rp" data-role="pharmacy" onclick="pickRole('pharmacy')" id="rp-pharmacy">약국</div>
        <div class="rp" data-role="lab" onclick="pickRole('lab')" id="rp-lab">검사실</div>
      </div>
      <div class="field"><label id="lbl-name">이름</label><input id="login-name" placeholder="예: 김민준"></div>
      <div class="field" id="dept-field">
        <label id="lbl-dept">진료과</label>
        <select id="login-dept" onchange="onLoginDeptChange()">
          <option value="">선택하세요</option>
          <option value="내과">내과</option>
          <option value="소아과">소아과</option>
          <option value="산부인과">산부인과</option>
          <option value="피부과">피부과</option>
          <option value="치과">치과</option>
          <option value="정형외과">정형외과</option>
          <option value="안과">안과</option>
          <option value="이비인후과">이비인후과</option>
          <option value="정신과">정신과</option>
          <option value="__custom__">기타 (직접 입력)</option>
          <option value="admin">선교사 (관리자 권한, 모든 화면 조작 가능)</option>
        </select>
        <input id="login-dept-custom" placeholder="진료과명을 입력하세요" style="display:none; margin-top:8px;">
      </div>
      <button class="btn" id="btn-start" onclick="doLogin()">시작하기</button>
      <div id="login-error">이름을 입력해주세요.</div>
    </div>
  </div>
</div>

<!-- ================= APP ================= -->
<div id="app-shell">
  <div class="shell">
    <div class="sidebar">
      <h1>EMR for Love</h1>
      <div class="whoami" id="whoami-label"></div>
      <select id="sidebar-lang-select" onchange="setLang(this.value)" style="width:100%; margin-bottom:14px; font-size:11px; padding:5px 6px; border-radius:6px; border:none; background:#12335E; color:#fff;">
        <option value="ko">한국어</option>
        <option value="km">ភាសាខ្មែរ</option>
      </select>

      <div class="site-select">
        <label>사이트</label>
        <select id="site-select" onchange="onSiteChange()"></select>
        <div class="site-manage-link" onclick="setScreen('sites')">+ 사이트 관리</div>
      </div>

      <div id="nav-list"></div>
      <div class="logout-link" onclick="logout()">로그아웃 / 역할 변경</div>
    </div>

    <div class="main" id="main">
      <div class="empty-note">불러오는 중...</div>
    </div>
  </div>
</div>

<!-- Gemini 의학 Q&A / 번역 위젯 -->
<div class="fab" onclick="toggleGemini()">✦</div>
<div class="gemini-panel" id="gemini-panel">
  <div class="gemini-head">의학 Q&A · 번역 도우미</div>
  <div class="gemini-body" id="gemini-body">
    <div class="gemini-bubble">약물 용법·용량, 의학 지식, 크메르어-한국어 번역을 물어보세요. (환자 개인정보는 입력하지 마세요)</div>
  </div>
  <div class="gemini-input">
    <input id="gemini-input" placeholder="질문을 입력하세요..." onkeydown="if(event.key==='Enter') sendGemini()">
    <button onclick="sendGemini()">전송</button>
  </div>
</div>

let currentUser = null; // {role, name, dept, lang}

function doLogin(){
  const name = document.getElementById('login-name').value.trim();
  if(!name){ document.getElementById('login-error').style.display='block'; return; }
  const deptSel = document.getElementById('login-dept').value;
  const dept = deptSel === '__custom__' ? document.getElementById('login-dept-custom').value.trim() : deptSel;
  currentUser = { role: pendingRole, name, dept: pendingRole==='doctor' ? (dept||'미지정') : '', lang: currentLang };

function isAdminUser(){
  return !!(currentUser && currentUser.role==='doctor' && (currentUser.dept||'').trim().toLowerCase()==='admin');
}
// area: 'pharmacy' | 'lab' — 해당 화면에서 실제로 조작(입력/완료처리)이 가능한지
function canEditArea(area){
  if(isAdminUser()) return true;
  if(area==='pharmacy') return currentUser && currentUser.role==='pharmacy';
  if(area==='lab') return currentUser && currentUser.role==='lab';
  return false;
}

function logout(){
  sessionStorage.removeItem('emr_user');
  location.reload();
}

function enterApp(){
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-shell').style.display = 'block';
  const roleLabel = isAdminUser() ? `선교사 · ${currentUser.name}`
    : currentUser.role==='doctor' ? `${currentUser.dept} · ${currentUser.name} 선생님`
    : currentUser.role==='pharmacy' ? `약국 · ${currentUser.name}`
    : currentUser.role==='lab' ? `검사실 · ${currentUser.name}`
    : `접수 · ${currentUser.name}`;
  document.getElementById('whoami-label').textContent = roleLabel;
  initSites();
  renderNav();
  const initialScreen = currentUser.role==='doctor' ? 'queue' : currentUser.role==='pharmacy' ? 'pharmacy' : currentUser.role==='lab' ? 'lab' : 'reg';
  // 종료 확인 가드: 히스토리 맨 아래에 exit-guard를 깔아두고, 그 위에 첫 화면을 쌓는다.
  // 화면 전환(setScreen)은 계속 맨 위 항목만 교체(replaceState)하므로 가드는 항상 맨 아래에 그대로 남아있고,
  // 사용자가 최상위 화면(대기리스트 등)에서 뒤로가기를 누르면 이 가드에 도달하며 종료 확인창이 뜨게 된다.
  history.replaceState({type:'exit-guard'}, '', location.href);
  history.pushState({type:'screen', screen: initialScreen, app:true}, '', '#'+initialScreen);
  suppressHistoryPush = true;
  setScreen(initialScreen);
  suppressHistoryPush = false;
  startMessageWatcher();
}

window.addEventListener('popstate', function(e){
  if(!e.state) return;
  if(e.state.type === 'exit-guard'){
    // 최상위 화면에서 뒤로가기를 눌러 종료 직전까지 온 상태. 정말 종료할지 확인한다.
    const wantExit = confirm('EMR for Love를 종료하시겠습니까?\n(작성 중인 내용이 있다면 저장 후 종료해주세요)');
    if(wantExit){
      history.back(); // 가드보다 더 뒤로 이동 → 실제 앱 종료(또는 이전 페이지)로 진행
    } else {
      // 취소: 방금 있던 화면(또는 차트)을 다시 앞으로 밀어넣어 앱 안에 그대로 머무르게 한다
      suppressHistoryPush = true;
      if(screenName === 'chart' && activePatientId){
        history.pushState({type:'chart', patientId: activePatientId, waitingId: activeWaitingId, deptIndex: activeDeptIndex, app:true}, '', '#chart');
      } else {
        history.pushState({type:'screen', screen: screenName, app:true}, '', '#'+screenName);
      }
      suppressHistoryPush = false;
    }
    return;
  }
  suppressHistoryPush = true;
  try{
    if(e.state.type === 'chart'){
      openChart(e.state.patientId, e.state.waitingId, e.state.deptIndex);
    } else if(e.state.type === 'screen'){
      screenName = e.state.screen;
      renderNav();
      renderMain();
    }
  } finally {
    suppressHistoryPush = false;
  }
});

window.addEventListener('beforeunload', function(e){
  e.preventDefault();
  e.returnValue = '';
});

let sites = []; // [{id, name, prefix, nextNumber}]
let currentSiteId = null;

function initSites(){
  db.collection('sites').orderBy('name').onSnapshot(snap=>{
    sites = snap.docs.map(d=>({id:d.id, ...d.data()}));
    if(sites.length===0){
      seedDefaultSites();
      return;
    }
    const sel = document.getElementById('site-select');
    const prevValue = sel.value;
    sel.innerHTML = sites.map(s=>`<option value="${s.id}">${s.name} (${s.prefix||'no prefix'})</option>`).join('');
    if(sites.find(s=>s.id===prevValue)){
      sel.value = prevValue;
    } else {
      const defaultSite = sites.find(s=>s.name==='클리닉');
      if(defaultSite) sel.value = defaultSite.id;
    }
    currentSiteId = sel.value || sites[0].id;
    if(screenName==='sites' || screenName==='reg') renderMain(); // 목록 갱신
  }, err=>{
    console.error(err);
    alert('사이트 목록을 불러오지 못했습니다.\n\n오류 내용: ' + err.message + '\n\n이 메시지를 캡처해서 보내주세요.');
  });
}

async function seedDefaultSites(){
  const defaults = [
    {name:'진료소', prefix:'H'},
    {name:'교도소', prefix:''},
    {name:'교회', prefix:'C'}
  ];
  try{
    for(const s of defaults){
      await db.collection('sites').add({...s, nextNumber:1});
    }
  }catch(err){
    console.error(err);
    alert('기본 사이트 생성에 실패했습니다.\n\n오류 내용: ' + err.message + '\n\n이 메시지를 캡처해서 보내주세요.');
  }
}

function onSiteChange(){
  currentSiteId = document.getElementById('site-select').value;
  if(['queue','search'].includes(screenName)) renderMain();
}

async function addSite(){
  const name = document.getElementById('new-site-name').value.trim();
  const prefix = document.getElementById('new-site-prefix').value.trim();
  if(!name){ alert('사이트 이름을 입력해주세요.'); return; }
  try{
    await db.collection('sites').add({name, prefix, nextNumber:1});
    document.getElementById('new-site-name').value='';
    document.getElementById('new-site-prefix').value='';
    renderMain();
  }catch(err){
    console.error(err);
    alert('사이트 추가에 실패했습니다.\n\n오류 내용: ' + err.message + '\n\n이 메시지를 캡처해서 보내주세요.');
  }
}

async function generateRegNo(siteId){
  const siteRef = db.collection('sites').doc(siteId);
  let regNo;
  await db.runTransaction(async tx=>{
    const snap = await tx.get(siteRef);
    const data = snap.data();
    const next = data.nextNumber || 1;
    regNo = (data.prefix||'') + String(next).padStart(5,'0');
    tx.update(siteRef, {nextNumber: next+1});
  });
  return regNo;
}

async function syncSiteCounterIfNeeded(siteId, regNo){
  const m = regNo.match(/(\d+)/);
  if(!m) return;
  const num = parseInt(m[0], 10);
  const siteRef = db.collection('sites').doc(siteId);
  await db.runTransaction(async tx=>{
    const snap = await tx.get(siteRef);
    const data = snap.data();
    const current = data.nextNumber || 1;
    if(num + 1 > current){
      tx.update(siteRef, {nextNumber: num+1});
    }
  });
}

async function resyncSiteCounter(siteId, siteName){
  if(!confirm(`"${siteName}" 사이트의 다음 등록번호를, 실제 등록된 환자들의 최대 번호 기준으로 다시 맞출까요?`)) return;
  try{
    const snap = await db.collection('patients').where('siteId','==',siteId).get();
    let maxNum = 0;
    snap.docs.forEach(d=>{
      const regNo = d.data().regNo || '';
      const m = regNo.match(/(\d+)/);
      if(m){
        const n = parseInt(m[0], 10);
        if(n > maxNum) maxNum = n;
      }
    });
    await db.collection('sites').doc(siteId).update({nextNumber: maxNum + 1});
    alert(`동기화 완료. 다음 등록번호가 ${maxNum + 1}(으)로 설정되었습니다.`);
    renderMain();
  }catch(err){
    alert('동기화 실패: ' + err.message);
  }
}

/* =========================================================
   메세지 (진료과/약국/검사실 간 간단한 메세지 송수신)

function getMessageChannels(){ return DEPT_OPTIONS.concat(['약국','검사실']); }
function myMessageChannel(){
  if(isAdminUser()) return null; // 관리자는 특정 채널에 속하지 않고 전체를 봄

}
let unsubscribeMessagesPanel = null;
// 메세지 화면 전체를 새로 띄우는 대신, 지금 보고 있는 화면 위에 슬라이드 패널로 열어준다.
function openMessagesPanel(){

// 어느 화면(차트/약국/검사실 등)에 있든, 나에게 온 새 메세지가 도착하면 화면 하단에 팝업으로 알려준다.
let messageWatcherUnsub = null;
let messageWatcherStartTime = null;
function startMessageWatcher(){
  messageWatcherStartTime = new Date();
  if(messageWatcherUnsub) messageWatcherUnsub();
  messageWatcherUnsub = db.collection('messages').orderBy('createdAt','desc').limit(20)
    .onSnapshot(snap=>{
      snap.docChanges().forEach(change=>{
        if(change.type !== 'added') return;
        const m = change.doc.data();
        if(!m.createdAt || !m.createdAt.toDate) return; // 서버에서 시간이 확정된 시점에만 판단 (내가 방금 보낸 낙관적 쓰기 중복 방지)
        if(!messageWatcherStartTime || m.createdAt.toDate().getTime() <= messageWatcherStartTime.getTime()) return; // 감시 시작(로그인/메세지 확인) 이전 메세지는 무시
        const myChannel = myMessageChannel();
        const isForMe = myChannel ? (m.toChannel === myChannel) : true; // 선교사(admin)는 전체 채널 수신
        if(!isForMe) return;
        if(m.fromName === currentUser.name) return; // 내가 보낸 메세지는 팝업 안 띄움
        showMessageToast(m);
      });
    }, err=>console.error('메세지 실시간 감시 실패', err));
}
function markMessagesSeenNow(){
  messageWatcherStartTime = new Date();
}
function showMessageToast(m){
  let toast = document.getElementById('msg-toast');
  if(!toast){
    toast = document.createElement('div');
    toast.id = 'msg-toast';
    document.body.appendChild(toast);
  }
  toast.innerHTML = `
    <div style="font-weight:700; margin-bottom:4px;">💬 새 메세지 (${(m.fromChannel||'')}${m.fromName?' · '+m.fromName:''} → ${m.toChannel})</div>
    <div style="font-size:12.5px; white-space:pre-wrap; max-height:60px; overflow:hidden;">${(m.text||'').slice(0,120)}</div>
    <div style="display:flex; gap:8px; margin-top:8px;">
      <button class="btn small" style="width:auto; padding:6px 12px;" onclick="openMessagesPanel(); document.getElementById('msg-toast').style.display='none';">보기</button>
      <button class="btn small outline" style="width:auto; padding:6px 12px;" onclick="document.getElementById('msg-toast').style.display='none';">닫기</button>
    </div>
  `;
  toast.style.display = 'block';
  clearTimeout(window.__msgToastTimer);
  window.__msgToastTimer = setTimeout(()=>{ const el = document.getElementById('msg-toast'); if(el) el.style.display='none'; }, 12000);
}
async function sendMessage(){
  const toChannel = document.getElementById('msg-to').value;
  const text = document.getElementById('msg-text').value.trim();
  if(!text){ alert('내용을 입력해주세요.'); return; }
  try{
    await db.collection('messages').add({
      toChannel,
      fromChannel: myMessageChannel() || '관리자',
      fromName: currentUser.name,
      text,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    document.getElementById('msg-text').value = '';
  }catch(err){
    alert('메세지 전송 실패: ' + err.message);
  }
}

function getTodayRange(){
  const now = new Date();
  const start = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const end = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23,59,59);
  return {
    startTs: firebase.firestore.Timestamp.fromDate(start),
    endTs: firebase.firestore.Timestamp.fromDate(end)
  };
}

// 방문 문서가 "실제 진료 기록"인지 판정하는 공용 함수.
// 등록 시 자동 생성되는 '(초진 등록)' 스텁만 걸러내고, 그 외에는 progressNote(글 형태의 소견)가
// 비어 있어도 BP/체중/혈당/처방/plan/PDF 등 임상 내용이 하나라도 있으면 "실제 진료"로 인정한다.
// (예전 로직은 progressNote가 비어있으면 무조건 제외했는데, 이 때문에 바쁜 현장에서
//  소견을 따로 타이핑하지 않고 처방/BP만 기록한 실제 진료가 통계·리스트에서 누락되는 문제가 있었음)
function isRealVisitDoc(d){
  const note = (d.progressNote||'').toString().trim();
  if(note === '(초진 등록)') return false;
  const hasBp = (d.bp||'').toString().trim();
  const hasWeight = (d.weight||'').toString().trim();
  const hasGlucose = (d.glucose||'').toString().trim();
  const hasPlan = (d.plan||'').toString().trim();
  const hasRxItems = Array.isArray(d.prescriptionItems) && d.prescriptionItems.length>0;
  const hasRxText = (d.prescription||'').toString().trim();
  const hasPdf = !!d.pdfURL;
  return !!(note || hasBp || hasWeight || hasGlucose || hasPlan || hasRxItems || hasRxText || hasPdf);
}

async function getTodayVisitedPatients(){
  const {startTs, endTs} = getTodayRange();
  const visitsSnap = await db.collectionGroup('visits')
    .where('date','>=',startTs).where('date','<=',endTs).get();
  const realDocs = visitsSnap.docs.filter(v=> isRealVisitDoc(v.data()));
  const uniquePatientIds = [...new Set(realDocs.map(v=>v.ref.parent.parent.id))];
  const patientDocs = await Promise.all(uniquePatientIds.map(pid=>db.collection('patients').doc(pid).get()));
  const patientMap = {};
  patientDocs.forEach(d=>{ if(d.exists) patientMap[d.id] = d.data(); });

  // 환자별로 오늘의 가장 최근 방문만 대표로 표시
  const latestByPatient = {};
  realDocs.forEach(v=>{
    const pid = v.ref.parent.parent.id;
    const ms = v.data().date && v.data().date.toMillis ? v.data().date.toMillis() : 0;
    if(!latestByPatient[pid] || ms > latestByPatient[pid].ms){
      latestByPatient[pid] = {ms};
    }
  });
  return Object.entries(latestByPatient).map(([pid, {ms}])=>{
    const p = patientMap[pid] || {};
    return {patientId: pid, name: p.name||'(알 수 없음)', regNo: p.regNo||'-', gender:p.gender, age:p.age, siteName: p.siteName||'-', ms};
  }).filter(x=>{
    const p = patientMap[x.patientId];
    return !(p && p.testPatient);
  }).sort((a,b)=> b.ms - a.ms);
}

const DEPT_OPTIONS = ['내과','소아과','산부인과','피부과','치과','정형외과','안과','이비인후과','정신과'];
let deptPickerState = {}; // { uid: ['내과','소아과'] }

function deptPickerHTML(uid, label){
  if(!deptPickerState[uid]) deptPickerState[uid] = [];
  const options = DEPT_OPTIONS.map(d=>`<option value="${d}">${d}</option>`).join('') + `<option value="__custom__">기타 (직접 입력)</option>`;
  return `
    <div class="field" style="margin-top:6px;">
      <label>${label || '진료과'}</label>
      <div id="dept-chips-${uid}" style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px;">${deptChipsHTML(uid)}</div>
      <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
        <select id="dept-select-${uid}" style="flex:1; min-width:140px;" onchange="onDeptSelectChange('${uid}')">${options}</select>
        <input id="dept-custom-${uid}" placeholder="진료과명 입력" style="display:none; flex:1; min-width:140px;">
        <button type="button" class="btn small outline" onclick="addDeptToPicker('${uid}')">+ 진료과 추가</button>
      </div>
    </div>
  `;
}
function deptChipsHTML(uid){
  const list = deptPickerState[uid]||[];
  if(list.length===0) return '<span style="font-size:12.5px; color:var(--ink-soft);">추가된 진료과 없음 (없으면 "일반진료"로 접수됩니다)</span>';
  return list.map((d,i)=>`<span class="rx-chip" style="cursor:default;">${d} <span style="cursor:pointer; margin-left:4px;" onclick="removeDeptFromPicker('${uid}',${i})">✕</span></span>`).join('');
}
function onDeptSelectChange(uid){
  const sel = document.getElementById(`dept-select-${uid}`);
  const custom = document.getElementById(`dept-custom-${uid}`);
  if(!sel||!custom) return;
  custom.style.display = sel.value === '__custom__' ? 'inline-block' : 'none';
}
function addDeptToPicker(uid){
  const sel = document.getElementById(`dept-select-${uid}`);
  const custom = document.getElementById(`dept-custom-${uid}`);
  if(!sel) return;
  let val = sel.value === '__custom__' ? (custom.value||'').trim() : sel.value;
  if(!val){ alert('진료과명을 입력해주세요.'); return; }
  if(!deptPickerState[uid]) deptPickerState[uid] = [];
  if(deptPickerState[uid].includes(val)){ alert('이미 추가된 진료과입니다.'); return; }
  deptPickerState[uid].push(val);
  if(custom) custom.value = '';
  const chipsEl = document.getElementById(`dept-chips-${uid}`);
  if(chipsEl) chipsEl.innerHTML = deptChipsHTML(uid);
}
function removeDeptFromPicker(uid, idx){
  deptPickerState[uid].splice(idx,1);
  const chipsEl = document.getElementById(`dept-chips-${uid}`);
  if(chipsEl) chipsEl.innerHTML = deptChipsHTML(uid);
}
function getPickedDepts(uid){
  const list = (deptPickerState[uid]||[]).slice();
  return list.length ? list : ['일반진료'];
}
function resetDeptPicker(uid){
  deptPickerState[uid] = [];
}
function makeDepartments(names){
  return names.map(n=>({name:n, status:'waiting', doctorName:null}));
}
function computeOverallStatus(depts){
  if(!depts || depts.length===0) return 'waiting';
  if(depts.every(d=>d.status==='done')) return 'done';
  if(depts.some(d=>d.status==='inProgress' || d.status==='examPending' || d.status==='examDone' || d.status==='done')) return 'inProgress';
  return 'waiting';
}

function updateRegNoPreview(){
  const el = document.getElementById('next-regno-preview');
  const sel = document.getElementById('r-site');
  if(!el || !sel) return;
  const site = sites.find(s=>s.id===sel.value);
  if(!site){ el.textContent = ''; return; }
  const next = site.nextNumber || 1;
  const preview = (site.prefix||'') + String(next).padStart(5,'0');
  el.textContent = `이 사이트의 다음 등록번호: ${preview}`;
}

function onTestPatientToggle(){
  const testChecked = document.getElementById('r-test-patient-toggle').checked;
  const manualToggle = document.getElementById('r-manual-regno-toggle');
  if(testChecked){
    manualToggle.checked = true;
    manualToggle.disabled = true;
    document.getElementById('r-manual-regno-wrap').style.display = 'block';
    document.getElementById('next-regno-preview').style.display = 'none';
    const manualInput = document.getElementById('r-manual-regno');
    if(!manualInput.value) manualInput.value = 'H99999';
  } else {
    manualToggle.disabled = false;
  }
}

async function submitRegistration(){
  const name = document.getElementById('r-name').value.trim();
  if(!name){ alert('이름을 입력해주세요.'); return; }
  const siteId = document.getElementById('r-site').value;
  const site = sites.find(s=>s.id===siteId);
  if(!site){ alert('사이트를 아직 불러오지 못했습니다. 잠시 후 다시 시도해주세요.'); return; }

  const btn = document.getElementById('submit-reg-btn');
  btn.disabled = true;
  btn.textContent = '등록 중...';

  try{
    const gender = document.getElementById('r-gender').value;
    const age = document.getElementById('r-age').value;
    const phone = document.getElementById('r-phone').value;

    const history = {
      hypertension: document.getElementById('r-h-htn').checked,
      diabetes: document.getElementById('r-h-dm').checked,
      tb: document.getElementById('r-h-tb').checked,
      hepatitis: document.getElementById('r-h-hep').checked,
      hiv: document.getElementById('r-h-hiv').checked,
      drugAllergy: document.getElementById('r-h-allergy').checked,
      surgery: document.getElementById('r-h-surgery').checked
    };
    const historyNote = document.getElementById('r-h-note').value;
    const bp = document.getElementById('r-bp').value;
    const weight = document.getElementById('r-weight').value;

    const isManual = document.getElementById('r-manual-regno-toggle').checked;
    const isTestPatient = document.getElementById('r-test-patient-toggle').checked;
    const regNo = isManual
      ? document.getElementById('r-manual-regno').value.trim()
      : await generateRegNo(siteId);
    if(!regNo){ alert('등록번호를 입력해주세요.'); btn.disabled=false; btn.textContent=t('submitReg'); return; }
    if(isManual && !isTestPatient){
      await syncSiteCounterIfNeeded(siteId, regNo);
    }

    let photoURL = null;
    const photoFile = document.getElementById('r-photo').files[0];
    if(photoFile){
      const path = `patients/${regNo}_${Date.now()}_${photoFile.name}`;
      const ref = storage.ref().child(path);
      await ref.put(photoFile);
      photoURL = await ref.getDownloadURL();
    }

    const patientRef = await db.collection('patients').add({
      name, gender, age, phone, siteId, siteName: site.name, regNo, photoURL,
      history, historyNote, testPatient: isTestPatient,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    await patientRef.collection('visits').add({
      date: firebase.firestore.FieldValue.serverTimestamp(),
      bp, weight, progressNote:'(초진 등록)', prescription:'', plan:'',
      createdBy: { name: currentUser.name, dept: currentUser.dept||'' }
    });

    const chronicTags = [];
    if(history.hypertension) chronicTags.push('고혈압');
    if(history.diabetes) chronicTags.push('당뇨');

    const departments = makeDepartments(getPickedDepts('reg'));
    await db.collection('waitingList').add({
      patientId: patientRef.id, siteId, siteName: site.name, regNo, name, gender, age,
      chronicTags, status:'waiting', departments, sessionRx: [], testPatient: isTestPatient,
      checkinAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    resetDeptPicker('reg');
    alert(`등록 완료: ${regNo}`);
    setScreen('queue');
  }catch(err){
    console.error(err);
    alert('환자 등록에 실패했습니다.\n\n오류 내용: ' + err.message + '\n\n이 메시지를 캡처해서 보내주세요.');
    btn.disabled = false;
    btn.textContent = t('submitReg');
  }
}

let allPatientsCache = null;
let allPatientsCacheTime = 0;

async function getAllPatientsCached(){
  const now = Date.now();
  if(allPatientsCache && (now - allPatientsCacheTime) < 60000){
    return allPatientsCache; // 1분간 캐시 재사용 (검색할 때마다 매번 전체를 새로 불러오지 않도록)
  }
  const snap = await db.collection('patients').get();
  allPatientsCache = snap.docs.map(d=>({id:d.id, ...d.data()}));
  allPatientsCacheTime = now;
  return allPatientsCache;
}

async function doSearch(){
  const q = document.getElementById('search-q').value.trim();
  const siteFilter = document.getElementById('search-site').value;
  const results = document.getElementById('search-results');
  if(!q){ results.innerHTML=''; return; }
  results.innerHTML = `<div class="empty-note">${t('loading')}</div>`;

  const patients = await getAllPatientsCached();
  const qLower = q.toLowerCase();
  const matched = patients.filter(p =>
    (siteFilter === '' || p.siteId === siteFilter) &&
    ((p.name && p.name.toLowerCase().includes(qLower)) ||
     (p.regNo && p.regNo.toLowerCase().includes(qLower)))
  ).slice(0, 30);

  if(matched.length===0){ results.innerHTML = `<div class="empty-note">${t('noResults')}</div>`; return; }

  results.innerHTML = matched.map(p=>{
    return `
      <div class="queue-card" style="flex-wrap:wrap;">
        <div class="qc-info">
          <div class="name">${p.name}${testBadgeHTML(p.testPatient)}</div>
          <div class="meta">${p.gender||''} · ${ageLabel(p.age)} · ${p.siteName}</div>
        </div>
        <div class="qc-regno mono">${p.regNo}</div>
        ${currentUser.role==='doctor' ? `<button class="btn small outline" onclick="openChartSafely('${p.id}')">차트 보기</button>` : ''}
        <button class="btn small" onclick="showCheckinDeptPicker('${p.id}')">${t('checkIn')}</button>
        <div id="checkin-panel-${p.id}" style="display:none; width:100%; margin-top:10px; padding-top:10px; border-top:1px solid var(--line);"></div>
      </div>`;
  }).join('');
}

function showCheckinDeptPicker(patientId){
  resetDeptPicker('checkin-'+patientId);
  const container = document.getElementById(`checkin-panel-${patientId}`);
  if(!container) return;
  const isOpen = container.style.display !== 'none';
  if(isOpen){ container.style.display = 'none'; return; }
  container.style.display = 'block';
  container.innerHTML = `
    ${deptPickerHTML('checkin-'+patientId)}
    <button class="btn small" onclick="checkInExisting('${patientId}')">접수 확정</button>
  `;
}

async function checkInExisting(patientId){
  const doc = await db.collection('patients').doc(patientId).get();
  const p = doc.data();
  const chronicTags = [];
  if(p.history?.hypertension) chronicTags.push('고혈압');
  if(p.history?.diabetes) chronicTags.push('당뇨');
  const departments = makeDepartments(getPickedDepts('checkin-'+patientId));
  await db.collection('waitingList').add({
    patientId, siteId:p.siteId, siteName:p.siteName, regNo:p.regNo, name:p.name, gender:p.gender, age:p.age,
    chronicTags, status:'waiting', departments, sessionRx: [], testPatient: !!p.testPatient,
    checkinAt: firebase.firestore.FieldValue.serverTimestamp()
  });
  resetDeptPicker('checkin-'+patientId);
  alert('대기 리스트에 등록되었습니다.');
  setScreen('queue');
}

  try{

    alert('세트 삭제 실패: ' + err.message);
  }
}
function removeEmptyRxRows(){
  const tbody = document.getElementById('rx-table-body');
  if(!tbody) return;
  tbody.querySelectorAll('tr').forEach(tr=>{
    const idx = tr.id.replace('rx-row-','');
    if(rxRowLockedItems[idx]) return; // 다른 과의 잠긴(읽기전용) 처방행은 입력창이 없으므로 "빈 줄"로 오인해 지우면 안 됨
    const drug = document.getElementById(`rx-drug-${idx}`)?.value.trim();
    if(!drug) tr.remove();
  });
}
function applyPreset(id){
  const p = presets.find(x=>x.id===id);
  if(!p) return;
  removeEmptyRxRows(); // 빈 줄은 정리하고, 이미 담긴 처방은 그대로 둔 채 이어서 추가
  (p.items||[]).forEach(item => addRxRow(item, true));
}
async function renamePreset(id){
  const p = presets.find(x=>x.id===id);
  if(!p) return;
  const name = prompt('처방 세트의 새 이름을 입력하세요', p.name);
  if(!name || name===p.name) return;
  try{
    await db.collection('presets').doc(id).update({name});
  }catch(err){ alert('이름 변경 실패: ' + err.message); }
}
async function saveCurrentAsPreset(){
  const items = collectRxRows();
  if(items.length===0){ alert('먼저 처방 내용을 입력해주세요.'); return; }
  const name = prompt('이 처방 세트의 이름을 입력하세요 (예: 고혈압 기본세트)');
  if(!name) return;
  await db.collection('presets').add({name, items, createdAt: firebase.firestore.FieldValue.serverTimestamp()});
}

function repeatLastPrescription(){
  // 이 환자의 이전 진료 기록 중 가장 최근에 처방이 있었던 것을 찾음 (activeVisitsCache는 날짜 오름차순)
  for(let i = activeVisitsCache.length - 1; i >= 0; i--){
    const v = activeVisitsCache[i];
    if(v.prescriptionItems && v.prescriptionItems.length){
      const tbody = document.getElementById('rx-table-body');
      if(tbody) tbody.innerHTML = '';
      rxRowCount = 0;
      v.prescriptionItems.forEach(item => addRxRow({...item, by:null, byDept:null}, true));
      alert(`${fmtDate(v.date)} 처방을 불러왔습니다. 필요하면 수정 후 진료를 완료해주세요.`);
      return;
    }
  }
  alert('반복할 이전 처방 기록이 없습니다.');
}

// "검색 → 차트 보기"나 "진료완료 리스트"에서 접수 세션(waitingId) 없이 차트를 직접 열면,
// 다른 과가 이미 접수해 진행 중인 세션과 무관한 "독립된" 방문 기록이 새로 만들어져서
// 처방이 서로 합쳐지지 않고 약국에도 과별로 따로 전달되는 문제가 있었다.
// (같은 환자를 그날 오전에 이미 등록·처방·약국전달까지 테스트해본 뒤, 오후에 검색으로 다시 찾아

async function openChart(patientId, waitingId, deptIndex){
  activePatientId = patientId;
  activeWaitingId = waitingId;
  activeDeptIndex = (deptIndex===undefined) ? null : deptIndex;
  activeDeptName = null;
  activeSessionRx = [];
  activeExamOrder = null;
  activeDraftDiagnoses = [];
  activeCarriedRxRowThreshold = 0;
  rxRowPrescriberMap = {};
  rxRowLockedItems = {};
  screenName = 'chart';
  renderNav();
  const main = document.getElementById('main');
  main.innerHTML = `<div class="empty-note">불러오는 중...</div>`;

  let referralMessageToShow = null;
  let referralFromInfo = null;
  let draftNote = null;
  let reopenedDoneDeptWarning = false;

  if(waitingId){
    try{
      const wDoc = await db.collection('waitingList').doc(waitingId).get();
      if(wDoc.exists){
        const wdata = wDoc.data();
        activeSessionRx = wdata.sessionRx || [];
        if(wdata.departments && wdata.departments.length && activeDeptIndex !== null && wdata.departments[activeDeptIndex]){
          const dept = wdata.departments[activeDeptIndex];
          activeDeptName = dept.name;
          draftNote = dept.draftNote || null; // 검사처방 등으로 화면을 나가기 전 임시 저장해둔 작성중 내용
          if(dept.referralMessage && !dept.referralMessageShown){
            referralMessageToShow = dept.referralMessage;
            referralFromInfo = {name: dept.referredBy||'', dept: dept.referredByDept||''};
          }
          if(dept.status === 'done'){
            // 이미 약국으로 처방이 넘어갔을 수 있는 상태에서 다시 열었다는 것을 알려준다.
            reopenedDoneDeptWarning = (wdata.status === 'done' && wdata.lastRxMode === 'pharmacy');
          }
          const updatedDept = {...dept};
          let needsWrite = false;
          if(dept.status === 'waiting' || dept.status === 'examDone'){
            updatedDept.status = 'inProgress';
            updatedDept.doctorName = currentUser.name;
            needsWrite = true;
          }
          if(referralMessageToShow){
            updatedDept.referralMessageShown = true;
            needsWrite = true;
          }
          if(needsWrite){
            const depts = wdata.departments.slice();
            depts[activeDeptIndex] = updatedDept;
            const overall = computeOverallStatus(depts);
            await wDoc.ref.update({departments: depts, status: overall});
          }
          if(dept.examOrderId){
            try{
              const exDoc = await db.collection('labQueue').doc(dept.examOrderId).get();
              if(exDoc.exists) activeExamOrder = {id: exDoc.id, ...exDoc.data()};
            }catch(e){}
          }
        } else if(wdata.status === 'waiting'){
          await wDoc.ref.update({status:'inProgress'}).catch(()=>{});
        }
      }
    }catch(e){ console.error(e); }
  }

  const pDoc = await db.collection('patients').doc(patientId).get();
  const patient = pDoc.data();
  activePatientData = patient;
  const visitsSnap = await db.collection('patients').doc(patientId).collection('visits')
    .orderBy('date','asc').limit(100).get();
  const visits = visitsSnap.docs.map(d=>({id:d.id, ...d.data()}));
  activeVisitsCache = visits;

  main.innerHTML = chartScreenHTML(patient, visits);
  rxRowCount = 0;
  if(draftNote && draftNote.rxItems && draftNote.rxItems.length){
    draftNote.rxItems.forEach(item => addRxRow(item, true));
  } else if(activeSessionRx && activeSessionRx.length){
    activeSessionRx.forEach(item => addRxRow(item, true));
  } else {
    addRxRow(null, true);
  }
  // 지금까지 채운 행(이전 과가 이미 넣었거나, 검사처방 등으로 나가기 전 내가 임시저장해둔 것)은
  // "다른 과 처방"으로 취급해 이 과의 처방 집계에서 제외한다. 이 이후에 새로 추가되는 행만 "내 처방".
  activeCarriedRxRowThreshold = draftNote ? 0 : rxRowCount;
  if(draftNote){
    // 검사처방 전달 등으로 화면을 나가기 전 작성 중이던 내용을 그대로 복원
    const setVal = (id, val)=>{ const el = document.getElementById(id); if(el) el.value = val||''; };
    setVal('v-bp', draftNote.bp); setVal('v-weight', draftNote.weight); setVal('v-glucose', draftNote.glucose);
    setVal('v-note', draftNote.note); setVal('v-plan', draftNote.plan);
    if(draftNote.rxMode){ const rm = document.getElementById('v-rx-mode'); if(rm) rm.value = draftNote.rxMode; }
    if(Array.isArray(draftNote.diagnoses) && draftNote.diagnoses.length){ activeDraftDiagnoses = draftNote.diagnoses.slice(); renderDiagnosisChips(); }
  }
  const noteEl = document.getElementById('v-note');
  if(noteEl) noteEl.focus();

  if(referralMessageToShow){
    const deptNameForMsg = activeDeptName;
    const fromLabel = referralFromInfo && (referralFromInfo.dept || referralFromInfo.name)
      ? ` (보낸 곳: ${referralFromInfo.dept || ''}${referralFromInfo.dept && referralFromInfo.name ? ' · ' : ''}${referralFromInfo.name || ''})`
      : '';
    setTimeout(()=>{ alert(`📋 진료 의뢰 메세지 (${deptNameForMsg})${fromLabel}:\n\n${referralMessageToShow}`); }, 300);
  }
  if(reopenedDoneDeptWarning){
    setTimeout(()=>{ alert('⚠️ 이 진료는 이미 완료되어 처방이 약국으로 전달된 접수 건입니다.\n여기서 내용을 수정하고 다시 "진료완료"를 누르면, 수정된 처방 내용이 약국에 새로 한 번 더 전달됩니다.\n(약국에서 이미 조제·투약을 시작했다면 꼭 약국에 알려주세요)'); }, 300);
  }

  if(!suppressHistoryPush){
    history.pushState({type:'chart', patientId, waitingId, deptIndex: activeDeptIndex, app:true}, '', '#chart');
  }
}

async function submitReferral(){
  const list = (deptPickerState['referral']||[]).slice();
  if(list.length===0){ alert('의뢰할 진료과를 선택해주세요.'); return; }
  const message = (document.getElementById('referral-msg')?.value || '').trim();
  try{
    const wRef = db.collection('waitingList').doc(activeWaitingId);
    const wDoc = await wRef.get();
    if(!wDoc.exists){ alert('접수 정보를 찾을 수 없습니다.'); return; }
    const wdata = wDoc.data();
    const depts = (wdata.departments && wdata.departments.length) ? wdata.departments.slice() : [{name:'일반진료', status:'done'}];
    list.forEach(deptName=>{
      depts.push({name: deptName, status:'waiting', doctorName:null, referredBy: currentUser.name, referredByDept: activeDeptName || currentUser.dept || '', referralMessage: message || null, referralMessageShown:false});
    });
    const overall = computeOverallStatus(depts);
    await wRef.update({departments: depts, status: overall});
    resetDeptPicker('referral');
    closeSidePanel();
    alert(`${list.join(', ')}(으)로 진료 의뢰를 보냈습니다. 대기 리스트에 새 버튼이 생성됩니다.`);
  }catch(err){
    alert('진료 의뢰 실패: ' + err.message);
  }
}

function onDxSearchInput(){

  if(!q){ box.style.display = 'none'; box.innerHTML = ''; return; }
  const matches = allDiagnosisOptions().filter(dx =>
    (dx.ko && dx.ko.toLowerCase().includes(q)) || (dx.en && dx.en.toLowerCase().includes(q)) || (dx.code && dx.code.toLowerCase().includes(q))
  ).slice(0, 15);
  const qEscaped = q.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');
  const aiButtonHTML = `<div style="padding:9px 12px; cursor:pointer; color:var(--teal); font-weight:600;" onclick="searchDiagnosisViaGemini('${qEscaped}')">🤖 AI로 진단명/ICD-11 코드 더 찾아보기</div>`;
  if(matches.length===0){
    box.style.display = 'block';
    box.innerHTML = `<div style="padding:10px; font-size:13px; color:var(--ink-soft);">내장 목록에 일치하는 진단명이 없습니다.</div>` + aiButtonHTML;
    return;
  }
  box.style.display = 'block';
  box.innerHTML = matches.map((dx,i)=>`

    </div>
  `).join('') + aiButtonHTML;
  window.__dxSearchMatches = matches;
}
// 실제 Gemini 호출 + 파싱. 실패하면 에러를 던진다 (호출부에서 재시도/표시 처리).
async function callGeminiForDiagnosisList(query){
  const prompt = `당신은 의료 코드 보조 도구입니다. 아래 한글 또는 영문 진단명/증상 검색어와 관련된 WHO ICD-11 진단명을 최대한 폭넓게 찾아주세요.
검색어: "${query}"

요구사항:
- 검색어와 정확히 일치하는 진단명뿐 아니라, 관련된 세부 진단명(아형)·유사 진단명도 모두 포함하세요.
  예를 들어 "위염"이면 급성 위염, 만성 위염, 미란성 위염, 위축성 위염, 헬리코박터균 위염, 알코올성 위염, 담즙역류위염, 상세불명의 위염 등 임상에서 실제로 쓰이는 세부 진단명들을 가능한 많이 나열하세요.
- 실제로 존재하고 자주 쓰이는 진단명 위주로, 최소 10개에서 최대 20개까지 제안하세요. 억지로 개수를 채우기 위해 없는 진단명을 만들지는 마세요.
- 반드시 아래 JSON 배열 형식으로만 답하세요. 다른 설명, 마크다운, 코드블록 없이 순수 JSON 배열만 출력하세요.
[{"code":"ICD-11 코드","ko":"한글 진단명","en":"영문 진단명"}]
- 정확한 코드가 확실치 않으면 code에 "확인필요"라고 적으세요.`;
  const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    // thinkingConfig로 내부 사고 과정을 꺼야 응답 토큰을 사고에 다 뺏기지 않고 JSON 답변이 끝까지 나온다 (응답이 잘리던 문제의 원인이었음)
    body: JSON.stringify({ contents:[{parts:[{text:prompt}]}], generationConfig:{ temperature:0.2, maxOutputTokens:2048, responseMimeType:'application/json', thinkingConfig:{ thinkingBudget:0 } } })
  });
  const data = await resp.json();
  if(data.error) throw new Error(data.error.message || JSON.stringify(data.error));
  const candidate = data.candidates?.[0];
  if(!candidate){ throw new Error('AI가 응답을 생성하지 못했습니다. 검색어를 조금 바꿔서 다시 시도해주세요.'); }
  if(candidate.finishReason === 'SAFETY'){ throw new Error('AI 안전 필터에 걸려 응답이 차단되었습니다. 증상/진단명을 조금 더 일반적인 표현으로 검색해보세요.'); }
  const rawText = candidate.content?.parts?.[0]?.text || '';
  if(!rawText){ throw new Error(`AI 응답이 비어있습니다${candidate.finishReason ? ' (사유: '+candidate.finishReason+')' : ''}. 다시 시도해주세요.`); }
  let cleaned = rawText.replace(/```json|```/g,'').trim();
  const firstBracket = cleaned.indexOf('[');
  const lastBracket = cleaned.lastIndexOf(']');
  if(firstBracket !== -1 && lastBracket !== -1 && lastBracket > firstBracket){
    cleaned = cleaned.slice(firstBracket, lastBracket+1);
  }
  try{
    return JSON.parse(cleaned);
  }catch(parseErr){
    console.error('AI 진단명 응답 파싱 실패, 원본 응답:', rawText);
    throw new Error('AI 응답 형식이 올바르지 않습니다. 다시 시도해주세요.');
  }
}

// 내장 목록에 없는 진단명을 Gemini API로 검색 (검색어만 전송되며, 환자 개인정보는 전송되지 않음)
async function searchDiagnosisViaGemini(query, isRetry){
  const box = document.getElementById('dx-suggestions');
  if(!box || !query) return;
  box.style.display = 'block';
  box.innerHTML = `<div style="padding:10px; font-size:13px; color:var(--ink-soft);">🤖 AI로 검색 중...</div>`;
  try{
    const results = await callGeminiForDiagnosisList(query);
    if(!Array.isArray(results) || results.length===0){
      box.innerHTML = `<div style="padding:10px; font-size:13px; color:var(--ink-soft);">AI도 결과를 찾지 못했습니다. "+ 목록에 없는 진단명 직접 추가"를 이용해주세요.</div>`;
      return;
    }
    box.innerHTML = results.map((dx,i)=>`
      <div style="padding:9px 12px; border-bottom:1px solid var(--line); cursor:pointer;" onclick='selectDiagnosisFromSearch(${i})'>
        <b>${dx.ko||'(이름 없음)'}</b> ${dx.en?`<span style="color:var(--ink-soft);">(${dx.en})</span>`:''} <span class="mono" style="float:right;">${dx.code||'확인필요'}</span>
        <div style="font-size:10.5px; color:var(--rust); margin-top:2px;">🤖 AI 제안 — 선택하면 다음부터 계속 검색되도록 자동 저장되며, 정확한 코드는 WHO ICD-11 사이트에서 한 번 더 확인해주세요</div>
      </div>
    `).join('');
    window.__dxSearchMatches = results;
    window.__dxSearchFromAI = true;
  }catch(err){
    const isTransient = /high demand|503|overloaded|UNAVAILABLE|timeout|quota|429/i.test(err.message||'');
    if(isTransient && !isRetry){
      // "Please retry in 30.9s" 같은 안내가 있으면 그 시간만큼, 없으면 기본 2초 기다렸다가 자동으로 한 번 더 시도
      const waitMatch = (err.message||'').match(/retry in ([\d.]+)s/i);
      const waitMs = waitMatch ? Math.ceil(parseFloat(waitMatch[1])*1000) + 500 : 2000;
      box.innerHTML = `<div style="padding:10px; font-size:13px; color:var(--ink-soft);">AI 서버가 혼잡합니다 (${Math.round(waitMs/1000)}초 후 자동 재시도)...</div>`;
      setTimeout(()=>searchDiagnosisViaGemini(query, true), waitMs);
      return;
    }
    const qEscapedRetry = query.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');
    box.innerHTML = `<div style="padding:10px; font-size:13px; color:var(--rust);">AI 검색 실패: ${err.message}</div>
      <div style="padding:9px 12px; cursor:pointer; color:var(--teal); font-weight:600;" onclick="searchDiagnosisViaGemini('${qEscapedRetry}')">🔄 다시 시도</div>`;
  }
}
async function selectDiagnosisFromSearch(i){
  const dx = (window.__dxSearchMatches||[])[i];
  if(!dx) return;
  if(!activeDraftDiagnoses.some(d=>d.code===dx.code)) activeDraftDiagnoses.push(dx);
  renderDiagnosisChips();
  const searchEl = document.getElementById('dx-search');
  if(searchEl) searchEl.value = '';
  const box = document.getElementById('dx-suggestions');
  if(box){ box.style.display = 'none'; box.innerHTML = ''; }
  if(window.__dxSearchFromAI){
    // AI가 제안한 진단명은 다음부터 내장 목록처럼 바로 검색되도록 저장해둔다.
    window.__dxSearchFromAI = false;
    try{
      await db.collection('customDiagnoses').add({...dx, addedBy: currentUser.name, addedVia:'ai', createdAt: firebase.firestore.FieldValue.serverTimestamp()});
    }catch(err){ console.error('AI 진단명 저장 실패', err); }
  }
}

async function cleanupDuplicatePatients(){
  if(!confirm('중복된 등록번호를 찾아서 정리할까요? 각 그룹에서 진료기록이 가장 많은 하나만 남기고 나머지는 영구 삭제됩니다.')) return;
  const btn = document.getElementById('dedupe-btn');
  const log = document.getElementById('dedupe-log');
  btn.disabled = true;
  btn.textContent = '확인 중...';
  log.textContent = '';
  try{
    const snap = await db.collection('patients').get();
    const groups = {};
    snap.docs.forEach(d=>{
      const key = d.data().regNo || '(등록번호 없음)';
      if(!groups[key]) groups[key] = [];
      groups[key].push(d);
    });

    const dupKeys = Object.keys(groups).filter(k => groups[k].length > 1);
    log.textContent = `중복된 등록번호: ${dupKeys.length}건 발견\n`;

    let removed = 0;
    for(const regNo of dupKeys){
      const docs = groups[regNo];
      const withCounts = await Promise.all(docs.map(async d=>{
        const vsnap = await d.ref.collection('visits').get();
        return {doc:d, count:vsnap.size};
      }));
      withCounts.sort((a,b)=>b.count-a.count);
      const toRemove = withCounts.slice(1);
      for(const item of toRemove){
        const vsnap = await item.doc.ref.collection('visits').get();
        for(const v of vsnap.docs) await v.ref.delete();
        await item.doc.ref.delete();
        removed++;
      }
      log.textContent += `${regNo}: ${docs.length}건 중 ${toRemove.length}건 삭제\n`;
    }
    log.textContent += `=== 완료: 총 ${removed}건 삭제됨 ===`;
    alert(`정리 완료: 중복 ${removed}건을 삭제했습니다.`);
  }catch(err){
    alert('정리 실패: ' + err.message);
    log.textContent += '오류: ' + err.message;
  }
  btn.disabled = false;
  btn.textContent = '중복 등록번호 정리하기';
}

async function markImportedPatients(){
  const btn = document.getElementById('mark-imported-btn');
  if(!confirm('진료 기록이 없는 환자를 모두 "가져온 환자(재진 처리)"로 표시할까요?')) return;
  btn.disabled = true;
  btn.textContent = '확인 중...';
  try{
    const patientsSnap = await db.collection('patients').get();
    let marked = 0;
    const targets = [];
    for(const doc of patientsSnap.docs){
      if(doc.data().imported) continue; // 이미 처리됨
      const visitsSnap = await doc.ref.collection('visits').limit(1).get();
      if(visitsSnap.empty) targets.push(doc.ref);
    }
    for(let i=0; i<targets.length; i+=400){
      const batch = db.batch();
      targets.slice(i,i+400).forEach(ref => batch.update(ref, {imported:true}));
      await batch.commit();
      marked += Math.min(400, targets.length - i);
    }
    alert(`완료: ${marked}명을 가져온 환자(재진)로 표시했습니다.`);
  }catch(err){
    alert('처리 실패: ' + err.message);
  }
  btn.disabled = false;
  btn.textContent = '가져온 환자 표시하기';
}

async function exportAllData(){
  const btn = document.getElementById('backup-btn');
  btn.disabled = true;
  btn.textContent = '백업 파일 만드는 중...';
  try{
    const data = {};
    for(const col of ['sites','waitingList','presets','appointments','pharmacyQueue']){
      const snap = await db.collection(col).get();
      data[col] = snap.docs.map(d=>({id:d.id, ...d.data()}));
    }
    const patientsSnap = await db.collection('patients').get();
    data.patients = [];
    for(const p of patientsSnap.docs){
      const visitsSnap = await p.ref.collection('visits').get();
      data.patients.push({ id:p.id, ...p.data(), visits: visitsSnap.docs.map(v=>({id:v.id, ...v.data()})) });
    }
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `emr_backup_${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }catch(err){
    alert('백업 실패: ' + err.message);
  }
  btn.disabled = false;
  btn.textContent = '전체 데이터 백업 다운로드';
}

function linkify(text){

}

function ageLabel(age){
  if(age===undefined || age===null || age==='') return '';
  const s = String(age).trim();
  if(/^\d+$/.test(s)) return s + '세'; // 순수 숫자면 '세' 붙임
  return s; // '10개월'처럼 이미 단위가 포함된 경우 그대로 표시
}

function parseAgeYears(age){
  if(age===undefined || age===null || age==='') return NaN;
  const s = String(age).trim();
  if(/개월|mo/i.test(s)) return 0; // 1세 미만 영아는 0-9세 그룹으로 집계
  const n = parseInt(s);
  return isNaN(n) ? NaN : n;
}

function fmtDate(ts){
  if(!ts || !ts.toDate) return '-';
  const d = ts.toDate();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

  item = item || {};
  if(locked){
    const ownerLabel = `${(owner&&owner.byDept)||''}${(owner&&owner.by)?(' · '+owner.by):''}`;
    const detail = [item.dose, item.freq, item.duration?(item.duration+'일'):'', item.timing, item.note].filter(Boolean).join(' · ');
    return `
    <tr id="rx-row-${idx}" style="background:var(--paper);">
      <td colspan="7" style="padding:8px 10px; color:var(--ink);">
        🔒 <b>${item.drug||''}</b>${detail?(' · '+detail):''}
        <span style="float:right; font-size:11.5px; color:var(--ink-soft);">${ownerLabel} 처방 (다른 과 · 수정 불가)</span>
      </td>
    </tr>`;
  }
  return `
    <tr id="rx-row-${idx}">
      <td><input id="rx-drug-${idx}" placeholder="약품명" value="${item.drug||''}" onchange="checkDuplicateRxDrug(${idx})" style="width:100%; border:1px solid var(--line); border-radius:4px; padding:5px;"></td>
      <td><input id="rx-dose-${idx}" placeholder="예: 500mg" value="${item.dose||''}" style="width:100%; border:1px solid var(--line); border-radius:4px; padding:5px;"></td>
      <td><select id="rx-freq-${idx}" style="width:100%; padding:5px;">${rxOptionsHTML(RX_FREQ_OPTIONS, item.freq)}</select></td>
      <td><input id="rx-dur-${idx}" type="number" placeholder="일수" value="${item.duration||''}" style="width:100%; border:1px solid var(--line); border-radius:4px; padding:5px;"></td>
      <td><select id="rx-timing-${idx}" style="width:100%; padding:5px;">${rxOptionsHTML(RX_TIMING_OPTIONS, item.timing)}</select></td>
      <td><input id="rx-note-${idx}" placeholder="약국 참고사항" value="${item.note||''}" style="width:100%; border:1px solid var(--line); border-radius:4px; padding:5px;"></td>
      <td><span style="cursor:pointer; color:var(--rust);" onclick="removeRxRow(${idx})">✕</span></td>
    </tr>`;
}

// 이미 다른 행(다른 과 포함)에 같은 약품명이 있으면 중복 처방 여부를 확인한다.
function checkDuplicateRxDrug(idx){
  const input = document.getElementById(`rx-drug-${idx}`);
  if(!input) return;
  const val = input.value.trim();
  if(!val) return;
  const tbody = document.getElementById('rx-table-body');
  if(!tbody) return;
  let dup = null;
  tbody.querySelectorAll('tr').forEach(tr=>{
    const otherIdx = tr.id.replace('rx-row-','');
    if(String(otherIdx) === String(idx)) return;
    let otherDrug, otherBy, otherDept;
    if(rxRowLockedItems[otherIdx]){
      otherDrug = rxRowLockedItems[otherIdx].drug;
      otherBy = rxRowLockedItems[otherIdx].by;
      otherDept = rxRowLockedItems[otherIdx].byDept;
    } else {
      otherDrug = document.getElementById(`rx-drug-${otherIdx}`)?.value.trim();
      const owner = rxRowPrescriberMap[otherIdx];
      otherBy = owner ? owner.by : '';
      otherDept = owner ? owner.byDept : '';
    }
    if(otherDrug && otherDrug.toLowerCase() === val.toLowerCase()){
      dup = {drug: otherDrug, by: otherBy, byDept: otherDept};
    }
  });
  if(dup){
    const who = dup.byDept ? `${dup.byDept}${dup.by?(' · '+dup.by):''}` : (dup.by || '다른 처방');
    const proceed = confirm(`⚠️ "${dup.drug}"은(는) 이미 ${who}에서 처방한 약품입니다.\n중복으로 처방하시겠습니까?`);
    if(!proceed){ input.value=''; input.focus(); }
  }
}

// "+ 약 추가" 버튼용: 이미 입력된 1번째(첫 줄) 약의 1일 횟수/총 투약일/투약 시기를 기본값으로 물려받아 새 줄을 추가.
// 약품명/용량/기타사항은 약마다 다르므로 비워두고, 필요하면 새 줄에서 개별로 값을 바꿀 수 있다.
function addRxRowWithDefaults(){
  const tbody = document.getElementById('rx-table-body');
  let defaults = {};
  if(tbody){
    const firstRow = tbody.querySelector('tr');
    if(firstRow){
      const idx = firstRow.id.replace('rx-row-','');
      defaults = {
        freq: document.getElementById(`rx-freq-${idx}`)?.value || '',
        duration: document.getElementById(`rx-dur-${idx}`)?.value || '',
        timing: document.getElementById(`rx-timing-${idx}`)?.value || ''
      };
    }
  }
  addRxRow(defaults);
}

function addRxRow(item, noFocus){
  const idx = rxRowCount++;
  const tbody = document.getElementById('rx-table-body');
  if(!tbody) return;
  if(item && item.by){
    rxRowPrescriberMap[idx] = {by: item.by, byDept: item.byDept||''};
  }
  const owner = rxRowPrescriberMap[idx];
  // 다른 과가 이미 처방한 약은, 지금 열려있는 과(activeDeptName)와 다르면 이 화면에서는 읽기전용으로 잠근다.
  // (관리자/선교사 계정은 필요시 수정할 수 있도록 예외)
  const locked = !!(owner && owner.byDept && activeDeptName && owner.byDept !== activeDeptName && !isAdminUser());
  if(locked) rxRowLockedItems[idx] = {...item, by: owner.by, byDept: owner.byDept};
  tbody.insertAdjacentHTML('beforeend', rxRowHTML(idx, item, locked, owner));
  if(!noFocus && !locked){
    const drugInput = document.getElementById(`rx-drug-${idx}`);
    if(drugInput) drugInput.focus();
  }
}

function removeRxRow(idx){
  const row = document.getElementById(`rx-row-${idx}`);
  if(row) row.remove();
}

function collectRxRows(){
  const rows = [];
  const tbody = document.getElementById('rx-table-body');
  if(!tbody) return rows;
  tbody.querySelectorAll('tr').forEach(tr=>{
    const idx = tr.id.replace('rx-row-','');
    if(rxRowLockedItems[idx]){
      rows.push(rxRowLockedItems[idx]); // 잠긴(다른 과) 처방행은 입력창이 없으므로 원본 데이터를 그대로 유지
      return;
    }
    const drug = document.getElementById(`rx-drug-${idx}`)?.value.trim();
    if(!drug) return;
    const carried = rxRowPrescriberMap[idx];
    rows.push({
      drug,
      dose: document.getElementById(`rx-dose-${idx}`)?.value.trim() || '',
      freq: document.getElementById(`rx-freq-${idx}`)?.value || '',
      duration: document.getElementById(`rx-dur-${idx}`)?.value || '',
      timing: document.getElementById(`rx-timing-${idx}`)?.value || '',
      note: document.getElementById(`rx-note-${idx}`)?.value.trim() || '',
      by: carried ? carried.by : (currentUser ? currentUser.name : ''),
      byDept: carried ? carried.byDept : (activeDeptName || (currentUser && currentUser.dept) || '')
    });
  });
  return rows;
}

// 이 진료과가 이번에 "새로" 추가한 약만 골라낸다 (다른 과가 이미 넣어둔 처방은 제외).
// 진료 기록(타임라인)에는 각 의사가 실제로 처방한 약만 나와야 하기 때문.
function collectNewRxRows(){
  const rows = [];
  const tbody = document.getElementById('rx-table-body');
  if(!tbody) return rows;
  tbody.querySelectorAll('tr').forEach(tr=>{
    const idx = parseInt(tr.id.replace('rx-row-',''), 10);
    if(idx < activeCarriedRxRowThreshold) return;
    if(rxRowLockedItems[idx]) return; // 다른 과 처방(잠긴 행)은 입력창이 없고, 내가 새로 추가한 것도 아니므로 제외
    const drug = document.getElementById(`rx-drug-${idx}`)?.value.trim();
    if(!drug) return;
    rows.push({
      drug,
      dose: document.getElementById(`rx-dose-${idx}`)?.value.trim() || '',
      freq: document.getElementById(`rx-freq-${idx}`)?.value || '',
      duration: document.getElementById(`rx-dur-${idx}`)?.value || '',
      timing: document.getElementById(`rx-timing-${idx}`)?.value || '',
      note: document.getElementById(`rx-note-${idx}`)?.value.trim() || '',
      by: currentUser ? currentUser.name : '',
      byDept: activeDeptName || (currentUser && currentUser.dept) || ''
    });
  });
  return rows;
}

function rxItemsToText(items){
  return (items||[]).map(i => `${i.drug} ${i.dose||''} ${i.freq||''} ${i.timing||''} ${i.duration?('x'+i.duration+'일'):''}${i.note?(' ['+i.note+']'):''}`.replace(/\s+/g,' ').trim()).join('\n');
}

function rxItemsToTableHTML(items, showPrescriber){
  if(!items || items.length===0) return '';
  const rows = items.map(i=>`
    <tr><td>${i.drug}</td><td>${i.dose||'-'}</td><td>${i.freq||'-'}</td><td>${i.timing||'-'}</td><td>${i.duration?i.duration+'일':'-'}</td><td>${i.note||'-'}</td>${showPrescriber?`<td>${i.byDept?i.byDept+' · ':''}${i.by||'-'}</td>`:''}</tr>
  `).join('');
  return `<table class="chronic-table" style="margin-top:6px;">
    <tr><th>약품명</th><th>용량</th><th>빈도</th><th>시기</th><th>기간</th><th>기타사항</th>${showPrescriber?'<th>처방의</th>':''}</tr>${rows}
  </table>`;
}

function testBadgeHTML(isTest){
  return isTest ? ' <span class="tag warn" style="background:#fee; color:#c0392b; border-color:#c0392b;">테스트용</span>' : '';
}

function historyTagsHTML(h){
  h = h || {};
  const tags = [];
  if(h.hypertension) tags.push('<span class="tag warn">고혈압</span>');
  if(h.diabetes) tags.push('<span class="tag warn">당뇨</span>');
  if(h.tb) tags.push('<span class="tag">폐결핵</span>');
  if(h.hepatitis) tags.push('<span class="tag">간염</span>');
  if(h.hiv) tags.push('<span class="tag">HIV</span>');
  if(h.drugAllergy) tags.push('<span class="tag warn">약물 알레르기</span>');
  if(h.surgery) tags.push('<span class="tag">수술력</span>');
  return tags.join('') || '<span class="tag">특이 과거력 없음</span>';
}

// 환자의 전체 진료 기록을 날짜 오름차순(오래된 것 → 최근 것)으로 쭉 이어서 보여주는 타임라인.
// 프로그레스 노트뿐 아니라 그날 실제로 작성된 진단명·검사결과·약처방(표 형식)까지 전부 보여주며,
// 과거력은 여기 포함하지 않는다(과거력은 별도 카드에 항상 표시됨). 다른 의사의 기록은 읽기 전용이다.
function visitTimelineHTML(visits){
  if(!visits || visits.length===0) return '<div class="empty-note">이전 기록이 없습니다.</div>';
  const body = visits.map(v=>{
    const attach = (v.photoURL || v.pdfURL) ? `<div class="attach-row">
        ${v.photoURL?`<a class="attach-chip" href="${v.photoURL}" target="_blank">📷 사진 보기</a>`:''}
        ${v.pdfURL?`<a class="attach-chip" href="${v.pdfURL}" target="_blank">📄 PDF 보기</a>`:''}
      </div>` : '';
    if(Array.isArray(v.deptEntries) && v.deptEntries.length){
      const blocks = v.deptEntries.map(deptEntryBlockHTML).join('<hr style="border:none; border-top:1px dashed var(--line); margin:10px 0;">');
      return `<div class="timeline-entry" id="timeline-${v.id}"><div class="tdate">${fmtDate(v.date)}</div>${blocks}${attach}</div>`;
    }
    // 이번 업데이트 이전 방식으로 저장된 옛 기록과의 호환 표시
    return `<div class="timeline-entry" id="timeline-${v.id}">
      <div class="tdate">${fmtDate(v.date)}</div>
      ${v.progressNote ? `<p style="white-space:pre-wrap; margin:6px 0;">${v.progressNote}</p>` : '<p style="color:var(--ink-soft); margin:6px 0;">(작성된 소견 없음)</p>'}
      ${v.prescriptionItems && v.prescriptionItems.length ? `<div style="margin-top:6px;"><b>약처방</b>${rxItemsToTableHTML(v.prescriptionItems)}</div>` : (v.prescription?`<p style="white-space:pre-wrap;">${v.prescription}</p>`:'')}
      ${attach}
    </div>`;
  }).join('');
  return `<div style="max-height:520px; overflow-y:auto; padding-right:4px;">${body}</div>`;
}

// 진료 기록 안에서 한 진료과의 기록 한 블록 (소견 → 진단명 → 검사결과 → 약처방(표) → 향후계획 → 서명 순서)
function deptEntryBlockHTML(e){
  const noteText = e.note && e.note.trim() ? e.note.trim() : '(작성된 소견 없음)';
  const dxHTML = (e.diagnoses && e.diagnoses.length)
    ? `<div style="margin-top:6px; font-size:13px;"><b>진단명:</b> ${e.diagnoses.map(d=>`${d.ko}${d.en?`(${d.en})`:''} · ${d.code}`).join(', ')}</div>` : '';
  const examHTML = (e.examItems && e.examItems.length)
    ? `<div style="margin-top:6px; font-size:13px;"><b>검사결과:</b> ${e.examItems.map(it=>`${it.name}${it.result?(': '+it.result):' (결과 미기재)'}`).join(', ')}</div>` : '';
  const rxHTML = (e.rxItems && e.rxItems.length)
    ? `<div style="margin-top:6px;"><b style="font-size:13px;">약처방</b>${rxItemsToTableHTML(e.rxItems)}</div>` : '';
  const planHTML = (e.plan && e.plan.trim()) ? `<div style="margin-top:6px; font-size:13px;"><b>향후계획:</b> ${e.plan.trim()}</div>` : '';
  const sig = `<div style="margin-top:6px; font-size:12px; color:var(--ink-soft);">&lt;${e.deptName} ${e.doctorName}&gt; ${e.completedAt ? formatSignatureTimestamp(new Date(e.completedAt)) : ''}</div>`;
  return `<div><div style="font-weight:700; font-size:15px; margin-bottom:4px;">[${e.deptName}]</div><p style="white-space:pre-wrap; margin:4px 0;">${noteText}</p>${dxHTML}${examHTML}${rxHTML}${planHTML}${sig}</div>`;
}

// "2026. 07. 15. 11:58 AM" 형식의 서명용 타임스탬프
function formatSignatureTimestamp(d){
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  let h = d.getHours();
  const ampm = h>=12 ? 'PM' : 'AM';
  h = h % 12; if(h===0) h = 12;
  const hh = String(h).padStart(2,'0');
  const mi = String(d.getMinutes()).padStart(2,'0');
  return `${yyyy}. ${mm}. ${dd}. ${hh}:${mi} ${ampm}`;
}

// 한 진료과가 완료 처리를 누른 시점에 Progress Note(텍스트)에 이어붙일 블록.
// 처방/검사결과/진단명은 여기 텍스트에 녹이지 않고 deptEntry의 구조화된 필드로 따로 저장해서,
// 진료 기록 화면에서 검사결과·약처방(표)·진단명을 각각 보기 좋게 구분해서 보여준다.
function buildDeptEntryText({deptName, doctorName, note, when}){
  const label = deptName || '일반진료';
  const lines = [`[${label}]`];
  lines.push(note && note.trim() ? note.trim() : '(작성된 소견 없음)');
  lines.push(`<${label} ${doctorName}> ${formatSignatureTimestamp(when)}`);
  return lines.join('\n');
}

async function saveVisit(silent){
  try{
    const photoFile = document.getElementById('v-photo').files[0];

    // 진료 내용 없이 사진만 첨부한 경우: 진료기록을 만들지 않고 환자 사진만 갱신
    if(!hasClinicalContent()){
      if(photoFile){
        const path = `patients/${activePatientId}/${Date.now()}_${photoFile.name}`;
        const ref = storage.ref().child(path);
        await ref.put(photoFile);
        const photoURL = await ref.getDownloadURL();
        await db.collection('patients').doc(activePatientId).update({photoURL});
        if(!silent) alert('사진이 환자 정보에 저장되었습니다. (진료 기록으로는 남지 않습니다)');
      }
      return;
    }

    const bp = document.getElementById('v-bp').value;
    const weight = document.getElementById('v-weight').value;
    const glucose = document.getElementById('v-glucose').value;
    const noteInput = document.getElementById('v-note').value;
    const prescriptionItems = collectRxRows();
    const prescription = rxItemsToText(prescriptionItems);
    const plan = document.getElementById('v-plan').value;
    const rxMode = document.getElementById('v-rx-mode').value;
    const pdfFile = document.getElementById('v-pdf').files[0];

    let photoURL = null, pdfURL = null;
    if(photoFile){
      const path = `patients/${activePatientId}/${Date.now()}_${photoFile.name}`;
      const ref = storage.ref().child(path);
      await ref.put(photoFile);
      photoURL = await ref.getDownloadURL();
      await db.collection('patients').doc(activePatientId).update({photoURL});
    }
    if(pdfFile){
      const path = `patients/${activePatientId}/${Date.now()}_${pdfFile.name}`;
      const ref = storage.ref().child(path);
      await ref.put(pdfFile);
      pdfURL = await ref.getDownloadURL();
    }

    const now = new Date();
    const deptLabel = activeDeptName || currentUser.dept || '일반진료';
    const examItems = activeExamOrder ? (activeExamOrder.items||[]) : [];
    const ownNewRxItems = collectNewRxRows(); // 다른 과가 이미 넣어둔 처방은 제외, 이 과가 새로 추가한 것만
    const diagnoses = (activeDraftDiagnoses||[]).slice();
    const entryText = buildDeptEntryText({deptName: deptLabel, doctorName: currentUser.name, note: noteInput, when: now});
    const deptEntry = {
      deptName: deptLabel, doctorName: currentUser.name,
      note: noteInput, rxItems: ownNewRxItems, examItems, diagnoses, plan,
      completedAt: now.toISOString()
    };

    // 같은 접수 세션(waitingId) 안에서 다른 진료과가 먼저 저장했는지 확인 -> 있으면 그 문서에 이어쓰기,
    // 없으면(이 세션의 첫 저장, 또는 접수 세션 없이 차트만 여는 경우) 새 방문 문서를 만든다.
    let existingVisitId = null;
    let wRefForSession = null;
    if(activeWaitingId){
      wRefForSession = db.collection('waitingList').doc(activeWaitingId);
      const wSnap = await wRefForSession.get();
      if(wSnap.exists) existingVisitId = wSnap.data().visitId || null;
    }

    if(existingVisitId){
      const visitRef = db.collection('patients').doc(activePatientId).collection('visits').doc(existingVisitId);
      const prevSnap = await visitRef.get();
      const prev = prevSnap.exists ? prevSnap.data() : {};
      const combinedNote = (prev.progressNote ? prev.progressNote + '\n\n' : '') + entryText;
      const combinedEntries = Array.isArray(prev.deptEntries) ? prev.deptEntries.concat([deptEntry]) : [deptEntry];
      await visitRef.update({
        progressNote: combinedNote,
        deptEntries: combinedEntries,
        bp: bp || prev.bp || '',
        weight: weight || prev.weight || '',
        glucose: glucose || prev.glucose || '',
        prescription, prescriptionItems,
        plan: plan || prev.plan || '',
        photoURL: photoURL || prev.photoURL || null,
        pdfURL: pdfURL || prev.pdfURL || null,
        dispenseMode: rxMode,
        lastUpdatedBy: { name: currentUser.name, dept: deptLabel }
      });
    } else {
      const newVisitRef = await db.collection('patients').doc(activePatientId).collection('visits').add({
        date: firebase.firestore.FieldValue.serverTimestamp(),
        bp, weight, glucose,
        progressNote: entryText,
        deptEntries: [deptEntry],
        prescription, prescriptionItems, plan, photoURL, pdfURL,
        dispenseMode: rxMode,
        createdBy: { name: currentUser.name, dept: deptLabel }
      });
      if(wRefForSession){
        await wRefForSession.update({ visitId: newVisitRef.id }).catch(()=>{});
      }
    }

    if(activeWaitingId){
      // 여러 진료과가 이어서 진료하는 경우: 처방을 바로 약국에 보내지 않고 접수 세션에 누적 저장.
      // 실제 약국 전송은 completeVisit()에서 "마지막 진료과"가 완료될 때 처리됨.
      await db.collection('waitingList').doc(activeWaitingId).update({
        sessionRx: prescriptionItems,
        lastRxMode: rxMode
      }).catch(()=>{});
    } else if(rxMode === 'pharmacy' && prescription.trim() && activePatientData){
      await db.collection('pharmacyQueue').add({
        patientId: activePatientId,
        patientName: activePatientData.name,
        regNo: activePatientData.regNo,
        siteName: activePatientData.siteName,
        testPatient: !!activePatientData.testPatient,
        prescription, prescriptionItems,
        status: 'waiting',
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    }

    if(!silent){
      alert('진료 기록이 저장되었습니다.' + (rxMode==='pharmacy' ? ' (진료 완료 처리 시 약국으로 전송됩니다)' : ''));
      openChart(activePatientId, activeWaitingId, activeDeptIndex);
    }
  }catch(err){
    alert('저장 실패: ' + err.message + '\n\n이 메시지를 캡처해서 보내주세요.');
    throw err;
  }
}

let isCompletingVisit = false;
async function completeVisit(){
  if(isCompletingVisit) return; // 중복 클릭으로 인한 진료 기록 중복 생성 방지
  isCompletingVisit = true;
  try{
    await saveHistorySilently();
    if(hasUnsavedVisitContent()){
      try{
        await saveVisit(true);
      }catch(err){
        return; // 저장 실패 시 완료 처리 중단 (기록 유실 방지)
      }
    }
    if(activeWaitingId){
    try{
      const wRef = db.collection('waitingList').doc(activeWaitingId);
      const wDoc = await wRef.get();
      if(wDoc.exists){
        const wdata = wDoc.data();
        let isLastDept = true;
        let updatePayload = {status:'done'};
        if(wdata.departments && wdata.departments.length){
          const depts = wdata.departments.slice();
          if(activeDeptIndex !== null && depts[activeDeptIndex]){
            depts[activeDeptIndex] = {...depts[activeDeptIndex], status:'done', doctorName: currentUser.name, completedAt: new Date().toISOString(), draftNote: null};
          }
          const overall = computeOverallStatus(depts);
          isLastDept = overall === 'done';
          updatePayload = {departments: depts, status: overall};
        }
        await wRef.update(updatePayload);

        if(isLastDept && wdata.lastRxMode === 'pharmacy' && (wdata.sessionRx||[]).length && activePatientData){
          const items = wdata.sessionRx;
          const presText = rxItemsToText(items);
          if(presText.trim()){
            await db.collection('pharmacyQueue').add({
              patientId: activePatientId,
              patientName: activePatientData.name,
              regNo: activePatientData.regNo,
              siteName: activePatientData.siteName,
              testPatient: !!activePatientData.testPatient,
              prescription: presText, prescriptionItems: items,
              status: 'waiting',
              createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
          }
        }
      }
    }catch(err){
      console.error(err);
      alert('진료 완료 처리 중 오류가 발생했습니다: ' + err.message);
    }
  }
  setScreen('queue');
  }finally{
    isCompletingVisit = false;
  }
}

async function deletePatient(){
  if(!activePatientData) return;
  const confirmText = prompt(`정말 삭제하시겠습니까? 이 환자의 모든 진료기록도 함께 영구 삭제됩니다.\n확인하려면 등록번호(${activePatientData.regNo})를 그대로 입력해주세요.`);
  if(confirmText !== activePatientData.regNo){
    if(confirmText !== null) alert('등록번호가 일치하지 않아 취소되었습니다.');
    return;
  }
  try{
    const visitsSnap = await db.collection('patients').doc(activePatientId).collection('visits').get();
    for(let i=0; i<visitsSnap.docs.length; i+=400){
      const batch = db.batch();
      visitsSnap.docs.slice(i,i+400).forEach(d => batch.delete(d.ref));
      await batch.commit();
    }
    const waitingSnap = await db.collection('waitingList').where('patientId','==',activePatientId).get();
    for(const d of waitingSnap.docs){ await d.ref.delete(); }

    await db.collection('patients').doc(activePatientId).delete();
    alert('환자가 삭제되었습니다. 등록번호를 다시 정확히 맞추려면 "사이트 관리"에서 해당 사이트의 "번호 동기화"를 눌러주세요.');
    setScreen('queue');
  }catch(err){
    alert('삭제 실패: ' + err.message);
  }
}
